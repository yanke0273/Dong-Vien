.bg-l{color:#bfdbfe;font-size:15px;line-height:1.85;opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s;font-style:italic;display:block;margin:2px 0;}
.bg-l.v{opacity:1;transform:none;}
.bg-l.d{color:#bae6fd;font-style:normal;}
.bg-l.w{color:#fef9c3;font-style:normal;}
#bg-fb{max-width:480px;width:90%;margin:14px auto 0;background:#0c1a2e;border:1px solid rgba(147,197,253,.4);border-radius:14px;padding:16px 20px;color:#bfdbfe;font-size:14px;line-height:1.7;font-family:sans-serif;display:none;}

.bg-btn{background:#0c1a2e;border:1px solid rgba(147,197,253,.4);border-radius:12px;color:#bfdbfe;font-size:14px;padding:13px 18px;cursor:pointer;font-family:'Georgia',serif;text-align:left;transition:all .25s;line-height:1.5;}
.bg-btn:hover{background:#112236;border-color:#93c5fd;transform:translateX(4px);}
.bg-btn.ok{border-color:#4ade80;background:#0a1f10;color:#bbf7d0;}
.bg-btn.no{border-color:#f87171;background:#1f0a0a;color:#fca5a5;}

#bg-prog{position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.1);z-index:20;}
#bg-pf{height:100%;background:#3b82f6;transition:width .6s ease;border-radius:0 2px 2px 0;}
#bg-inp{max-width:460px;width:90%;margin:18px auto 0;padding-bottom:28px;display:none;}
#bg-txt{width:100%;background:#0c1a2e;border:1px solid rgba(147,197,253,.45);border-radius:12px;color:#bfdbfe;font-size:15px;padding:13px 17px;font-family:'Georgia',serif;resize:none;height:75px;outline:none;}
#bg-txt:focus{border-color:#93c5fd;}
#bg-txt::placeholder{color:rgba(147,197,253,.35);}
.bg-sub{margin-top:10px;width:100%;background:#112236;border:1px solid rgba(147,197,253,.5);border-radius:12px;color:#bfdbfe;font-size:14px;padding:11px;cursor:pointer;font-family:'Georgia',serif;transition:all .25s;}
.bg-sub:hover{background:#17304d;}
#bg-diary{max-width:460px;width:90%;margin:0 auto 28px;background:#0c1a2e;border:1px solid rgba(147,197,253,.35);border-radius:16px;padding:22px;text-align:center;}
#bg-diary h3{color:#e0f2fe;font-size:17px;margin-bottom:10px;}
#bg-diary p{color:#7dd3fc;font-size:13px;line-height:1.7;font-family:sans-serif;}
.bg-nxt{margin-top:12px;background:#112236;border:1px solid rgba(147,197,253,.45);border-radius:10px;color:#bfdbfe;font-size:13px;padding:10px 18px;cursor:pointer;font-family:sans-serif;transition:all .2s;display:inline-block;margin-right:6px;}
.bg-nxt:hover{background:#17304d;}
.dream-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:480px;width:90%;margin:16px auto 0;padding-bottom:6px;}
.dream-card{background:#0c1a2e;border:1px solid rgba(147,197,253,.3);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .25s;color:#bfdbfe;font-size:13px;font-family:sans-serif;line-height:1.6;text-align:center;}
.dream-card:hover{background:#112236;border-color:#93c5fd;}
.dream-card.pick{border-color:#fbbf24;background:#1a1600;}
.dream-card .dream-icon{font-size:26px;margin-bottom:6px;display:block;}
.dream-card .dream-lbl{color:#7dd3fc;font-size:12px;margin-top:4px;}
.snow-flake{position:absolute;pointer-events:none;color:rgba(186,230,253,.5);font-size:var(--s);animation:snowfall var(--d) linear infinite;top:var(--top);left:var(--left);}
@keyframes snowfall{0%{transform:translateY(-20px) rotate(0deg);opacity:0;}10%{opacity:1;}90%{opacity:.6;}100%{transform:translateY(720px) rotate(360deg);opacity:0;}}
</style>

<script>
function addSnow(){
  const g=document.getElementById('bg-game');
  for(let i=0;i<18;i++){
    const s=document.createElement('div');
    s.className='snow-flake';
    s.textContent='❄';
    s.style.cssText=`--s:${10+Math.random()*14}px;--d:${6+Math.random()*10}s;--top:${-20+Math.random()*-60}px;--left:${Math.random()*100}%;animation-delay:${Math.random()*8}s;`;
    g.appendChild(s);
  }
}

const dreamChoices=[
  {icon:'☁',label:'Đám Mây Biết Hát',lbl:'giấc mơ về âm nhạc'},
  {icon:'★',label:'Ngôi Sao Lạc Lối',lbl:'giấc mơ về hy vọng'},
  {icon:'♫',label:'Dòng Sông Im Lặng',lbl:'giấc mơ về bình yên'},
  {icon:'✿',label:'Khu Vườn Mùa Đông',lbl:'giấc mơ về ký ức'},
];

let dreamPicked=null,dreamDone=false;
let memDone=false;
let starDone=false;

function pickDream(i){
  if(dreamDone)return;
  dreamDone=true;
  dreamPicked=i;
  document.querySelectorAll('.dream-card').forEach((c,ci)=>{
    c.style.pointerEvents='none';
    if(ci===i)c.classList.add('pick');
  });
  const fb=document.getElementById('bg-fb');
  const d=dreamChoices[i];
  fb.innerHTML=`Gấu mỉm cười trong giấc ngủ khi người chọn <em style="color:#7dd3fc">"${d.label}"</em>.<br><br>
<span style="color:#bfdbfe">"Đây là ${d.lbl} ta đã ôm suốt ngàn năm qua..."</span><br><br>
<em style="color:#bae6fd">Giấc mơ mở ra như một trang sách...</em>`;
  fb.className='s';
  setTimeout(()=>{document.getElementById('bg-ch').innerHTML=`<button class="bg-btn ok" onclick="bgo('bc2')">Bước vào giấc mơ →</button>`;},1800);
}

let memChoice=null;
function pickMem(i,ok){
  if(memDone)return;
  memDone=true;
  document.querySelectorAll('.bg-btn').forEach((b,bi)=>{b.disabled=true;if(bi===i)b.classList.add(ok?'ok':'no');});
  const fb=document.getElementById('bg-fb');
  const labels=['Tình thương','Ước mơ','Nỗi cô đơn','Hy vọng'];
  const msgs={
    0:`<span style="color:#bfdbfe">"Tình thương..."</span><br><br>Gấu lắc đầu nhẹ. <em style="color:#7dd3fc">"Tình thương không bao giờ là gánh nặng. Đó là thứ duy nhất khiến ta thức giấc."</em><br><small style="color:#93c5fd;margin-top:6px;display:block;">Hãy thử lại.</small>`,
    1:`<span style="color:#bfdbfe">"Ước mơ..."</span><br><br>Gấu trầm ngâm. <em style="color:#7dd3fc">"Ước mơ có thể biến mất khi ta thức dậy. Nhưng thứ ta gánh không tan biến được."</em><br><small style="color:#93c5fd;margin-top:6px;display:block;">Hãy thử lại.</small>`,
    2:`<strong style="color:#4ade80">Đúng rồi.</strong><br><br><span style="color:#bfdbfe">Gấu ngủ đông không phải vì lười biếng. Gấu ngủ vì nỗi cô đơn quá nặng để mang khi thức. Trong giấc ngủ, mọi thứ nhẹ hơn.</span><br><br><em style="color:#7dd3fc">"Ta ngủ để quên. Nhưng nỗi cô đơn vẫn theo ta vào từng giấc mơ."</em>`,
    3:`<span style="color:#bfdbfe">"Hy vọng..."</span><br><br>Gấu mỉm cười buồn. <em style="color:#7dd3fc">"Hy vọng là thứ ta tìm kiếm, không phải thứ ta trốn chạy."</em><br><small style="color:#93c5fd;margin-top:6px;display:block;">Hãy thử lại.</small>`,
  };
  fb.innerHTML=msgs[i];fb.className='s';
  if(ok){
    setTimeout(()=>{document.getElementById('bg-ch').innerHTML=`<button class="bg-btn ok" onclick="bgo('bc3')">Tiếp tục →</button>`;},2000);
  } else {
    setTimeout(()=>{
      document.querySelectorAll('.bg-btn').forEach(b=>{b.disabled=false;b.classList.remove('ok','no');});
      memDone=false;fb.className='';fb.innerHTML='';
    },2600);
  }
}

function pickStar(i,ok){
  if(starDone)return;
  starDone=true;
  document.querySelectorAll('.bg-btn').forEach((b,bi)=>{b.disabled=true;if(bi===i)b.classList.add(ok?'ok':'no');});
  const fb=document.getElementById('bg-fb');
  const starLabels=['Ước mơ thuở nhỏ bị bỏ lại','Người Gấu yêu thương đã rời đi','Lời hứa Gấu chưa giữ được','Phiên bản tốt hơn của chính Gấu'];
  if(ok){
    fb.innerHTML=`<strong style="color:#4ade80">Đúng rồi...</strong><br><br>
<span style="color:#bfdbfe">Ngôi sao rơi không phải ngẫu nhiên. Đó là ${starLabels[i]} — thứ Gấu không thể giữ lại khi còn thức, nên đã hóa thành ánh sáng trong giấc ngủ.</span><br><br>
<em style="color:#7dd3fc">"Ta đã ngủ để không phải nhìn nó rơi nữa..."</em>`;
    fb.className='s';
    setTimeout(()=>{document.getElementById('bg-ch').innerHTML=`<button class="bg-btn ok" onclick="bgo('bc4')">Tiếp tục →</button>`;},2000);
  } else {
    fb.innerHTML=`<span style="color:#bfdbfe">"${starLabels[i]}..."</span><br><br>Gấu lắc đầu nhẹ. <em style="color:#7dd3fc">"Không hẳn. Thứ rơi xuống là thứ Gấu không bao giờ nói ra."</em><br><small style="color:#93c5fd;margin-top:6px;display:block;">Hãy thử lại.</small>`;
    fb.className='s';
    setTimeout(()=>{
      document.querySelectorAll('.bg-btn').forEach(b=>{b.disabled=false;b.classList.remove('ok','no');});
      starDone=false;fb.className='';fb.innerHTML='';
    },2600);
  }
}

  document.getElementById('bg-inp').innerHTML=`<div style="padding:12px 0;text-align:center;">

    <span style="color:#7dd3fc;font-size:13px;font-family:sans-serif;display:block;margin-top:6px;">Gấu nhắm mắt và mỉm cười.</span>
    <span style="color:#93c5fd;font-size:13px;font-family:sans-serif;display:block;margin-top:4px;">"Ta đã chờ ai đó nói điều đó suốt ngàn năm qua."</span>
  </div>
  <button class="bg-sub" style="margin-top:14px" onclick="bgo('be')">Xem kết thúc...</button>`;
}

function bgo(id){
  document.getElementById('bg-fb').className='';document.getElementById('bg-fb').innerHTML='';
  dreamDone=false;memDone=false;starDone=false;
  brender(id);
}

function brender(id){
  const ch=bchaps.find(c=>c.id===id);if(!ch)return;
  document.getElementById('bg-pf').style.width=ch.prog+'%';
  document.getElementById('bg-ct').textContent=ch.title||'Tuyến Gấu';
  document.getElementById('bg-cn').textContent=ch.name||'';
  const ae=document.getElementById('bg-art');ae.innerHTML='';ch.art(ae);
  const ne=document.getElementById('bg-narr');ne.innerHTML='';
  ch.lines.forEach((l,i)=>{
    const s=document.createElement('span');
    s.className='bg-l'+(l.d?' d':'')+(l.w?' w':'');
    s.textContent=l.t;ne.appendChild(s);
    setTimeout(()=>s.classList.add('v'),180+i*270);
  });
  const ce=document.getElementById('bg-ch');ce.innerHTML='';
  const ie=document.getElementById('bg-inp');ie.style.display='none';ie.innerHTML='';
  const delay=ch.lines.length*270+380;

  if(ch.type==='dream'){
    dreamDone=false;
    setTimeout(()=>{
      const g=document.createElement('div');g.className='dream-grid';
      dreamChoices.forEach((d,i)=>{
        const c=document.createElement('div');c.className='dream-card';
        c.innerHTML=`<span class="dream-icon">${d.icon}</span><strong style="color:#e0f2fe;font-size:13px;">${d.label}</strong><div class="dream-lbl">${d.lbl}</div>`;
        c.onclick=()=>pickDream(i);g.appendChild(c);
      });
      ce.appendChild(g);
    },delay);
  } else if(ch.type==='memory'){
    memDone=false;
    setTimeout(()=>{
      ch.choices.forEach((c,i)=>{
        const b=document.createElement('button');b.className='bg-btn';b.textContent=c.l;
        b.onclick=()=>pickMem(i,!!c.ok);ce.appendChild(b);
      });
    },delay);
  } else if(ch.type==='star'){
    starDone=false;
    setTimeout(()=>{
      ch.choices.forEach((c,i)=>{
        const b=document.createElement('button');b.className='bg-btn';b.textContent=c.l;
        b.onclick=()=>pickStar(i,!!c.ok);ce.appendChild(b);
      });
    },delay);
  } else if(ch.type==='input'){
    setTimeout(()=>{
      ie.style.display='block';
      ie.innerHTML=`<textarea id="bg-txt" placeholder="Nói điều đó với Gấu..."></textarea>
      <button class="bg-sub" onclick="bgsubmit()">Đánh thức Gấu ✦</button>`;
    },delay);
  } else if(ch.type==='ending'){
    setTimeout(()=>{
      ce.innerHTML=`<div id="bg-diary">
        <h3>📖 Nhật Ký Số 3 Đã Mở Khóa</h3>
        <p>"Đôi khi người ta không ngủ vì mệt.<br>Họ ngủ vì thức dậy đau hơn.<br>Và can đảm nhất không phải là chiến đấu —<br>mà là dám mở mắt thêm một lần nữa."</p>
        <div style="margin-top:14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
          <button class="bg-nxt" onclick="sendPrompt('Tôi đã hoàn thành tuyến Gấu! Hãy tạo tuyến truyện cho Cú mèo đêm 🦉')">Gặp 🦉 Cú Mèo Đêm ↗</button>
          <button class="bg-nxt" onclick="sendPrompt('Tôi đã xong Thỏ, Cáo và Gấu. Bí ẩn liên kết 4 nhân vật là gì?')">Bí ẩn 4 nhân vật ↗</button>
        </div>
      </div>`;
    },delay);
  } else if(ch.choices){
    setTimeout(()=>{
      ch.choices.forEach(c=>{
        const b=document.createElement('button');b.className='bg-btn';b.textContent=c.l;
        b.onclick=()=>bgo(c.n);ce.appendChild(b);
      });
    },delay);
  }
}
