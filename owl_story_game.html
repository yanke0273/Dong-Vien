
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html, body {
  width: 100%;
  height: 100%;
  background: #000;
}
#og{width:100%;height:100vh;min-height:720px;background:#070510;overflow:hidden;position:relative;font-family:'Georgia',serif;}
#op{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center; padding:20px 10px; height:100%;}
#ohdr{text-align:center;padding:26px 20px 0;width:100%;}
#oct{color:#a78bfa;font-size:11px;letter-spacing:3px;font-family:sans-serif;margin-bottom:5px;}
#ocn{color:#ede9fe;font-size: 20px;line-height:1.4;}
#oart{margin:18px auto 0;width:90%;max-width:320px;height:auto;flex-shrink:0;}
#oart svg { width:100%; height:auto; }
#onarr{max-width:520px;width:90%;margin:16px auto 0;text-align:center;}
.ol{color:#ddd6fe;font-size:15px;line-height:1.85;opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s;font-style:italic;display:block;margin:2px 0;}
.ol.v{opacity:1;transform:none;}
.ol.d{color:#c4b5fd;font-style:normal;}
.ol.w{color:#fde68a;font-style:normal;}
.ol.r{color:#f9a8d4;font-style:normal;}
#ofb{max-width:480px;width:90%;margin:14px auto 0;background:#120d24;border:1px solid rgba(167,139,250,.4);border-radius:14px;padding:16px 20px;color:#ddd6fe;font-size:14px;line-height:1.7;font-family:sans-serif;display:none;}
#ofb.s{display:block;}
#och{max-width:500px;width:90%;margin:18px auto 0;display:flex;flex-direction:column;gap:10px;padding-bottom:28px;}
.ob{background:#120d24;border:1px solid rgba(167,139,250,.4);border-radius:12px;color:#ddd6fe;font-size:14px;padding:13px 18px;cursor:pointer;font-family:'Georgia',serif;text-align:left;transition:all .25s;line-height:1.5;}
.ob:hover{background:#1a1035;border-color:#a78bfa;transform:translateX(4px);}
.ob.ok{border-color:#4ade80;background:#061a0e;color:#bbf7d0;}
.ob.no{border-color:#f87171;background:#1a0606;color:#fca5a5;}
.ob:disabled{cursor:default;transform:none;}
#oprog{position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.08);z-index:20;}
#opf{height:100%;background:#7c3aed;transition:width .6s ease;border-radius:0 2px 2px 0;}
#oinp{max-width:460px;width:90%;margin:18px auto 0;padding-bottom:28px;display:none;}
#otxt{width:100%;background:#120d24;border:1px solid rgba(167,139,250,.45);border-radius:12px;color:#ddd6fe;font-size:15px;padding:13px 17px;font-family:'Georgia',serif;resize:none;height:75px;outline:none;}
#otxt:focus{border-color:#a78bfa;}
#otxt::placeholder{color:rgba(196,181,253,.35);}
.osub{margin-top:10px;width:100%;background:#1a1035;border:1px solid rgba(167,139,250,.5);border-radius:12px;color:#ddd6fe;font-size:14px;padding:11px;cursor:pointer;font-family:'Georgia',serif;transition:all .25s;}
.osub:hover{background:#221448;}
#odiary{max-width:460px;width:90%;margin:0 auto 28px;background:#120d24;border:1px solid rgba(167,139,250,.35);border-radius:16px;padding:22px;text-align:center;}
#odiary h3{color:#ede9fe;font-size:17px;margin-bottom:10px;}
#odiary p{color:#a78bfa;font-size:13px;line-height:1.7;font-family:sans-serif;}
.onxt{margin-top:12px;background:#1a1035;border:1px solid rgba(167,139,250,.45);border-radius:10px;color:#ddd6fe;font-size:13px;padding:10px 18px;cursor:pointer;font-family:sans-serif;transition:all .2s;display:inline-block;margin-right:6px;margin-top:8px;}
.onxt:hover{background:#221448;}
.scroll-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:480px;width:90%;margin:16px auto 0;}
.scroll-card{background:#120d24;border:1px solid rgba(167,139,250,.3);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .25s;color:#ddd6fe;font-size:13px;font-family:sans-serif;line-height:1.6;text-align:center;}
.scroll-card:hover{background:#1a1035;border-color:#a78bfa;}
.scroll-card.pick{border-color:#fbbf24;background:#1a1400;}
.scroll-card.reveal-ok{border-color:#4ade80;background:#061a0e;}
.scroll-card.reveal-no{border-color:#f87171;background:#1a0606;opacity:.65;}
.scroll-icon{font-size:24px;margin-bottom:6px;display:block;}
.scroll-sub{color:#7c3aed;font-size:11px;margin-top:4px;font-family:sans-serif;}
.moon-flicker{position:absolute;pointer-events:none;border-radius:50%;background:rgba(196,181,253,.15);animation:flicker var(--d) ease-in-out infinite;top:var(--t);left:var(--l);width:var(--s);height:var(--s);}
@keyframes flicker{0%,100%{opacity:.15;}50%{opacity:.45;}}
</style>

function addMoonLight(){
  const g=document.getElementById('og');
  for(let i=0;i<14;i++){
    const m=document.createElement('div');m.className='moon-flicker';
    const s=(8+Math.random()*30)+'px';
    m.style.cssText=`--d:${2+Math.random()*5}s;--t:${Math.random()*90}%;--l:${Math.random()*95}%;--s:${s};animation-delay:${Math.random()*4}s;`;
    g.appendChild(m);
  }
}

];

let scrollDone=false,mirrorDone=false,voiceDone=false;

function pickScroll(i){
  if(scrollDone)return;
  const cards=document.querySelectorAll('.scroll-card');
  cards.forEach((c,ci)=>{
    c.style.pointerEvents='none';
    c.classList.add(scrollData[ci].safe?'reveal-ok':'reveal-no');
  });
  cards[i].classList.add('pick');
  scrollDone=true;
  const fb=document.getElementById('ofb');
  if(scrollData[i].safe){
    fb.innerHTML=`<strong style="color:#4ade80">Cuộn Sách Ánh Trăng mở ra.</strong><br><br>
<span style="color:#ddd6fe">${scrollData[i].msg}</span><br><br>
<em style="color:#c4b5fd">"Giống như ta vậy — ta chỉ nhớ những điều người khác đã chiếu sáng cho ta."</em>`;
    fb.className='s';
    setTimeout(()=>{document.getElementById('och').innerHTML=`<button class="ob ok" onclick="ogo('oc2')">Đọc tiếp bí mật →</button>`;},1800);
  } else {
    fb.innerHTML=`<span style="color:#ddd6fe">${scrollData[i].msg}</span><br><small style="color:#a78bfa;margin-top:6px;display:block;">Hãy chú ý — Ánh trăng luôn chứa bí mật sâu nhất.</small>`;
    fb.className='s';
    setTimeout(()=>{
      cards.forEach(c=>{c.classList.remove('pick','reveal-ok','reveal-no');c.style.pointerEvents='';});
      scrollDone=false;fb.className='';fb.innerHTML='';
    },2600);
  }
}

function osubmit(){
  const v=document.getElementById('otxt').value.trim();
  if(!v)return;
  document.getElementById('oinp').innerHTML=`<div style="padding:12px 0;text-align:center;">
    <em style="color:#ddd6fe;font-size:15px;font-family:Georgia,serif;">"${v}"</em><br><br>
    <span style="color:#a78bfa;font-size:13px;font-family:sans-serif;display:block;margin-top:6px;">Cú nhắm mắt lại.</span>
    <span style="color:#c4b5fd;font-size:13px;font-family:sans-serif;display:block;margin-top:4px;">"Đây là điều thư viện chưa từng có."</span>
  </div>
  <button class="osub" style="margin-top:14px" onclick="ogo('oe')">Xem kết thúc...</button>`;
}

function ogo(id){
  document.getElementById('ofb').className='';document.getElementById('ofb').innerHTML='';
  scrollDone=false;mirrorDone=false;voiceDone=false;
  orender(id);
}

function orender(id){
  const ch=ochaps.find(c=>c.id===id);if(!ch)return;
  document.getElementById('opf').style.width=ch.prog+'%';
  document.getElementById('oct').textContent=ch.title||'Tuyến Cú';
  document.getElementById('ocn').textContent=ch.name||'';
  const ae=document.getElementById('oart');ae.innerHTML='';ch.art(ae);
  const ne=document.getElementById('onarr');ne.innerHTML='';
  ch.lines.forEach((l,i)=>{
    const s=document.createElement('span');
    s.className='ol'+(l.d?' d':'')+(l.w?' w':'')+(l.r?' r':'');
    s.textContent=l.t;ne.appendChild(s);
    setTimeout(()=>s.classList.add('v'),180+i*280);
  });
  const ce=document.getElementById('och');ce.innerHTML='';
  const ie=document.getElementById('oinp');ie.style.display='none';ie.innerHTML='';
  const delay=ch.lines.length*280+380;

  if(ch.type==='scrolls'){
    scrollDone=false;
    setTimeout(()=>{
      const g=document.createElement('div');g.className='scroll-grid';
      scrollData.forEach((s,i)=>{
        const c=document.createElement('div');c.className='scroll-card';
        c.innerHTML=`<span class="scroll-icon">${s.icon}</span><strong style="color:#ede9fe;font-size:13px;">${s.label}</strong><div class="scroll-sub">${s.sub}</div>`;
        c.onclick=()=>pickScroll(i);g.appendChild(c);
      });
      ce.appendChild(g);
    },delay);
  } else if(ch.type==='mirror'){
    mirrorDone=false;
    setTimeout(()=>{ch.choices.forEach((c,i)=>{const b=document.createElement('button');b.className='ob';b.textContent=c.l;b.onclick=()=>pickMirror(i,!!c.ok);ce.appendChild(b);});},delay);
  } else if(ch.type==='voice'){
    voiceDone=false;
    setTimeout(()=>{ch.choices.forEach((c,i)=>{const b=document.createElement('button');b.className='ob';b.textContent=c.l;b.onclick=()=>pickVoice(i,!!c.ok);ce.appendChild(b);});},delay);
  } else if(ch.type==='input'){
    setTimeout(()=>{
      ie.style.display='block';
      ie.innerHTML=`<textarea id="otxt" placeholder="Nói với Cú điều người cảm thấy..."></textarea>
      <button class="osub" onclick="osubmit()">Trả lời Cú ✦</button>`;
    },delay);
  } else if(ch.type==='ending'){
    setTimeout(()=>{
      ce.innerHTML=`<div id="odiary">
        <h3>📖 Nhật Ký Số 4 Đã Mở Khóa</h3>
        <p>"Người biết tất cả bí mật của thế giới<br>đôi khi là người cô đơn nhất.<br>Vì không ai nghĩ rằng kẻ thông thái<br>cũng cần được hỏi: 'Bạn có ổn không?'"</p>
        <div style="margin-top:14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
          <button class="onxt" onclick="sendPrompt('Tôi đã hoàn thành cả 4 tuyến Thỏ, Cáo, Gấu, Cú. Hãy tiết lộ bí ẩn lớn liên kết 4 nhân vật và kết thúc thật sự của game!')">Giải mã bí ẩn 4 nhân vật ↗</button>
        </div>
      </div>`;
    },delay);
  } else if(ch.choices){
    setTimeout(()=>{ch.choices.forEach(c=>{const b=document.createElement('button');b.className='ob';b.textContent=c.l;b.onclick=()=>ogo(c.n);ce.appendChild(b);});},delay);
  }
}
