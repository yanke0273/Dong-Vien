
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html, body {
  width: 100%;
  height: 100%;
  background: #000;
}
#fg{width:100%;height:100vh;min-height:720px;background:#1a0800;overflow:hidden;position:relative;font-family:'Georgia',serif;}
#fp{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center; padding:20px 10px; height:100%;}
#fhdr{text-align:center;padding:26px 20px 0;width:100%;}
#fct{color:#fb923c;font-size:11px;letter-spacing:3px;font-family:sans-serif;margin-bottom:5px;}
#fcn{color:#fef3c7;font-size: 20px;line-height:1.4;}
#fart{margin:18px auto 0;width:90%;max-width:320px;height:auto;flex-shrink:0;}
#fart svg { width:100%; height:auto; }
#fnarr{max-width:520px;width:90%;margin:16px auto 0;text-align:center;}
.fl{color:#fde8c0;font-size:15px;line-height:1.85;opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s;font-style:italic;display:block;margin:2px 0;}
.fl.v{opacity:1;transform:none;}
.fl.d{color:#fcd34d;font-style:normal;}
#ffb{max-width:480px;width:90%;margin:14px auto 0;background:#2d1200;border:1px solid rgba(251,146,60,.5);border-radius:14px;padding:16px 20px;color:#fde8c0;font-size:14px;line-height:1.7;font-family:sans-serif;display:none;}
#ffb.s{display:block;}
#fch{max-width:500px;width:90%;margin:18px auto 0;display:flex;flex-direction:column;gap:10px;padding-bottom:28px;}
.fb{background:#2d1200;border:1px solid rgba(251,146,60,.5);border-radius:12px;color:#fde8c0;font-size:14px;padding:13px 18px;cursor:pointer;font-family:'Georgia',serif;text-align:left;transition:all .25s;line-height:1.5;}
.fb:hover{background:#3d1a00;border-color:#fb923c;transform:translateX(4px);}
.fb.ok{border-color:#4ade80;background:#0a2d10;color:#bbf7d0;}
.fb.no{border-color:#f87171;background:#2d0a0a;color:#fca5a5;}
.fb:disabled{cursor:default;}
#fprog{position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.1);z-index:20;}
#fpf{height:100%;background:#ea580c;transition:width .6s ease;border-radius:0 2px 2px 0;}
#finp{max-width:460px;width:90%;margin:18px auto 0;padding-bottom:28px;display:none;}
#ftxt{width:100%;background:#2d1200;border:1px solid rgba(251,146,60,.5);border-radius:12px;color:#fde8c0;font-size:15px;padding:13px 17px;font-family:'Georgia',serif;resize:none;height:75px;outline:none;}
#ftxt:focus{border-color:#fb923c;}
#ftxt::placeholder{color:rgba(253,232,192,.4);}
.fsub{margin-top:10px;width:100%;background:#3d1a00;border:1px solid rgba(251,146,60,.6);border-radius:12px;color:#fde8c0;font-size:14px;padding:11px;cursor:pointer;font-family:'Georgia',serif;transition:all .25s;}
.fsub:hover{background:#4d2200;}
.trap-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:480px;width:90%;margin:16px auto 0;padding-bottom:6px;}
.trap-card{background:#2d1200;border:1px solid rgba(251,146,60,.4);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .25s;color:#fde8c0;font-size:13px;font-family:sans-serif;line-height:1.5;}
.trap-card:hover{background:#3d1a00;border-color:#fb923c;}
.trap-card.reveal-ok{border-color:#4ade80;background:#0a2d10;}
.trap-card.reveal-no{border-color:#f87171;background:#2d0a0a;opacity:.7;}
.trap-card.pick{border-color:#fbbf24;background:#2d2000;}
.trap-label{font-size:12px;letter-spacing:1px;color:#fb923c;margin-bottom:5px;font-family:sans-serif;}
#fdiary{max-width:460px;width:90%;margin:0 auto 28px;background:#2d1a00;border:1px solid rgba(251,146,60,.4);border-radius:16px;padding:22px;text-align:center;}
#fdiary h3{color:#fef3c7;font-size:17px;margin-bottom:10px;}
#fdiary p{color:#fcd34d;font-size:13px;line-height:1.7;font-family:sans-serif;}
.fnxt{margin-top:12px;background:#3d1a00;border:1px solid rgba(251,146,60,.5);border-radius:10px;color:#fde8c0;font-size:13px;padding:10px 18px;cursor:pointer;font-family:sans-serif;transition:all .2s;display:inline-block;margin-right:6px;}
.fnxt:hover{background:#4d2200;}
</style>

const trapData=[
  {label:'Cửa Đỏ',hint:'Cáo nói: "Cửa này an toàn."',safe:true,msg:'Cáo đã nói thật — Cửa Đỏ là lối thoát thật sự!'},

];

let trapDone=false,riddleDone=false,theftDone=false;

function pickTrap(i){
  if(trapDone)return;
  const cards=document.querySelectorAll('.trap-card');
  cards.forEach((c,ci)=>{
    c.style.pointerEvents='none';
    c.classList.remove('pick');
    c.classList.add(trapData[ci].safe?'reveal-ok':'reveal-no');
  });
  cards[i].classList.add('pick');
  trapDone=true;
  const fb=document.getElementById('ffb');
  if(trapData[i].safe){
    fb.innerHTML=`<strong style="color:#4ade80">Chính xác!</strong> ${trapData[i].msg}<br><br>Cáo gật đầu: <em style="color:#fcd34d">"Người biết tin vào lời nói thật — đó là khôn ngoan đầu tiên."</em>`;
    fb.className='s';
    setTimeout(()=>{document.getElementById('fch').innerHTML=`<button class="fb ok" onclick="fgo('fc2')">Bước qua Cửa Đỏ →</button>`;},1600);
  } else {
    fb.innerHTML=`<strong style="color:#f87171">Đây là bẫy.</strong> ${trapData[i].msg}<br><br>Cáo thở dài: <em style="color:#fcd34d">"Sự hoài nghi không phải lúc nào cũng bảo vệ người."</em><br><small style="color:#fb923c;margin-top:6px;display:block;">Hãy nhìn lại — Cáo đã gợi ý về MỘT cánh cửa cụ thể.</small>`;
    fb.className='s';
    setTimeout(()=>{
      cards.forEach(c=>{c.classList.remove('pick','reveal-ok','reveal-no');c.style.pointerEvents='';});
      trapDone=false;fb.className='';fb.innerHTML='';
    },2600);
  }
}

function pickRiddle(i){
  if(riddleDone)return;
  riddleDone=true;
  document.querySelectorAll('.fb').forEach((b,bi)=>{b.disabled=true;if(bi===i)b.classList.add('no');});
  const ans=['kiến thức','tình yêu','ký ức','danh tiếng'];
  const fb=document.getElementById('ffb');
  fb.innerHTML=`Cáo mỉm cười khi nghe <em style="color:#fcd34d">"${ans[i]}"</em>.<br><br>
<strong style="color:#fb923c">"Thú vị. Nhưng đáp án thật là..."</strong><br><br>
<span style="color:#fef3c7"><em>"Không có đáp án."</em></span><br><br>
<span style="color:#fde8c0">Câu đố không có đáp án đúng — vì mỗi người có thứ khác nhau họ trân trọng nhất. Cáo muốn xem người chọn gì để hiểu <strong style="color:#fcd34d">người thật sự coi trọng điều gì.</strong></span>`;
  fb.className='s';
  setTimeout(()=>{document.getElementById('fch').innerHTML=`<button class="fb" onclick="fgo('fc3')" style="border-color:rgba(251,146,60,.6)">Bước vào căn hầm →</button>`;},2200);
}

function pickTheft(i,ok){
  if(theftDone)return;
  theftDone=true;
  document.querySelectorAll('.fb').forEach((b,bi)=>{b.disabled=true;if(bi===i)b.classList.add(ok?'ok':'no');});
  const labs=['thời gian','sự tự tin','những người thân yêu','ước mơ thuở nhỏ'];
  const fb=document.getElementById('ffb');
  if(ok){
    fb.innerHTML=`Cáo dừng lại lâu hơn bình thường.<br><br>
<em style="color:#fcd34d">"${labs[i]}..."</em><br><br>
<strong style="color:#4ade80">Đúng rồi.</strong> <span style="color:#fde8c0">Không ai có thể lấy đi thứ đó ngoài chính người. Nó mất đi từng chút một — khi người so sánh, khi nghe lời tiêu cực, khi tự nghi ngờ bản thân.</span><br><br>
Cáo nhìn thẳng: <em style="color:#fcd34d">"Ta biết cảm giác đó rất rõ."</em>`;
    fb.className='s';
    setTimeout(()=>{document.getElementById('fch').innerHTML=`<button class="fb ok" onclick="fgo('fc4')">Tiếp tục →</button>`;},1800);
  } else {
    fb.innerHTML=`<em style="color:#fca5a5">"${labs[i]}..."</em><br><br><span style="color:#fde8c0">Cáo lắc đầu nhẹ nhàng. "Thứ đó có thể mất vì hoàn cảnh bên ngoài. Nhưng thứ ta hỏi — không ai lấy được, trừ chính người."</span><br><small style="color:#fb923c;margin-top:6px;display:block;">Hãy suy nghĩ lại.</small>`;
    fb.className='s';
    setTimeout(()=>{
      document.querySelectorAll('.fb').forEach(b=>{b.disabled=false;b.classList.remove('ok','no');});
      theftDone=false;fb.className='';fb.innerHTML='';
    },2400);
  }
}

function fsubmit(){
  const v=document.getElementById('ftxt').value.trim();
  if(!v)return;
  document.getElementById('finp').innerHTML=`<div style="padding:12px 0;text-align:center;">
    <em style="color:#fde8c0;font-size:15px;font-family:Georgia,serif;">"${v}"</em><br><br>
    <span style="color:#fcd34d;font-size:13px;font-family:sans-serif;">Cáo giữ im lặng một lúc rất dài.</span><br>
    <span style="color:#fb923c;font-size:13px;font-family:sans-serif;margin-top:4px;display:block;">"Câu trả lời thành thật hơn ta tưởng."</span>
  </div>
  <button class="fsub" style="margin-top:14px" onclick="fgo('fe')">Xem kết thúc...</button>`;
}

function fgo(id){
  document.getElementById('ffb').className='';document.getElementById('ffb').innerHTML='';
  riddleDone=false;theftDone=false;trapDone=false;
  frender(id);
}

function frender(id){
  const ch=fchaps.find(c=>c.id===id);if(!ch)return;
  document.getElementById('fpf').style.width=ch.prog+'%';
  document.getElementById('fct').textContent=ch.title||'Tuyến Cáo';
  document.getElementById('fcn').textContent=ch.name||'';
  const ae=document.getElementById('fart');ae.innerHTML='';ch.art(ae);
  const ne=document.getElementById('fnarr');ne.innerHTML='';
  ch.lines.forEach((l,i)=>{
    const s=document.createElement('span');
    s.className='fl'+(l.d?' d':'');
    s.textContent=l.t;ne.appendChild(s);
    setTimeout(()=>s.classList.add('v'),180+i*270);
  });
  const ce=document.getElementById('fch');ce.innerHTML='';
  const ie=document.getElementById('finp');ie.style.display='none';ie.innerHTML='';
  const delay=ch.lines.length*270+380;

  if(ch.type==='trap'){
    trapDone=false;
    setTimeout(()=>{
      const g=document.createElement('div');g.className='trap-grid';
      trapData.forEach((t,i)=>{
        const c=document.createElement('div');c.className='trap-card';
        c.innerHTML=`<div class="trap-label">${t.label}</div><div style="font-size:12px;color:#fde8c0;margin-top:4px;">${t.hint}</div>`;
        c.onclick=()=>pickTrap(i);g.appendChild(c);
      });
      ce.appendChild(g);
    },delay);
  } else if(ch.type==='riddle'){
    setTimeout(()=>{
      ch.choices.forEach((c,i)=>{
        const b=document.createElement('button');b.className='fb';b.textContent=c.l;
        b.onclick=()=>pickRiddle(i);ce.appendChild(b);
      });
    },delay);
  } else if(ch.type==='theft'){
    setTimeout(()=>{
      ch.choices.forEach((c,i)=>{
        const b=document.createElement('button');b.className='fb';b.textContent=c.l;
        b.onclick=()=>pickTheft(i,!!c.ok);ce.appendChild(b);
      });
    },delay);
  } else if(ch.type==='input'){
    setTimeout(()=>{
      ie.style.display='block';
      ie.innerHTML=`<textarea id="ftxt" placeholder="Câu trả lời thật của bạn..."></textarea>
      <button class="fsub" onclick="fsubmit()">Trả lời Cáo ✦</button>`;
    },delay);
  } else if(ch.type==='ending'){
    setTimeout(()=>{
      ce.innerHTML=`<div id="fdiary">
        <h3>📖 Nhật Ký Số 2 Đã Mở Khóa</h3>
        <p>"Trí thông minh không có lòng dũng cảm chỉ là một chiếc bẫy đẹp.<br>Người thật sự khôn ngoan biết khi nào nên để lộ điểm yếu."</p>
        <div style="margin-top:14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
          <button class="fnxt" onclick="sendPrompt('Tôi đã hoàn thành tuyến Cáo! Hãy tạo tuyến truyện cho Gấu ngủ đông 🐻')">Gặp 🐻 Gấu Ngủ Đông ↗</button>
          <button class="fnxt" onclick="sendPrompt('Tôi đã xong Thỏ và Cáo. Bí ẩn liên kết 4 nhân vật là gì?')">Bí ẩn 4 nhân vật ↗</button>
        </div>
      </div>`;
    },delay);
  } else if(ch.choices){
    setTimeout(()=>{
      ch.choices.forEach(c=>{
        const b=document.createElement('button');b.className='fb';b.textContent=c.l;
        b.onclick=()=>fgo(c.n);ce.appendChild(b);
      });
    },delay);
  }
}

frender('fi');
</script>
