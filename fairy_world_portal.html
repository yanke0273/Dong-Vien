
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; }

  #world {
    width: 100%;
    min-height: 600px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, #0a0520 0%, #1a0a3e 40%, #2d1b69 70%, #1a3a2a 100%);
    cursor: pointer;
    border-radius: 16px;
    font-family: 'Georgia', serif;
  }

  /* Stars */
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur, 2s) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* Door */
  #door-wrap {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
    transition: opacity 0.5s;
  }

  #door-svg {
    filter: drop-shadow(0 0 20px #a855f7) drop-shadow(0 0 40px #7c3aed);
    cursor: pointer;
    transition: filter 0.3s;
  }
  #door-svg:hover {
    filter: drop-shadow(0 0 30px #f0abfc) drop-shadow(0 0 60px #c084fc);
  }

  .click-hint {
    color: #d8b4fe;
    font-size: 14px;
    margin-top: 12px;
    animation: pulse 2s ease-in-out infinite;
    text-shadow: 0 0 10px #a855f7;
    letter-spacing: 1px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* Particles */
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: flyOut var(--dur) ease-out forwards;
  }
  @keyframes flyOut {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  /* Forest scene */
  #forest {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.5s ease;
    pointer-events: none;
  }
  #forest.show {
    opacity: 1;
    pointer-events: all;
  }

  /* Welcome text */
  #welcome {
    position: absolute;
    top: 60px;
    left: 0; right: 0;
    text-align: center;
    color: #fef3c7;
    font-size: 22px;
    text-shadow: 0 0 20px #fbbf24, 0 0 40px #f59e0b;
    letter-spacing: 2px;
    opacity: 0;
    transform: translateY(-20px);
    transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
    z-index: 20;
    font-family: 'Georgia', serif;
    line-height: 1.6;
  }
  #welcome.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* Animal cards */
  #animals {
    position: absolute;
    bottom: 30px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    padding: 0 20px;
    z-index: 30;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1s ease 1.5s, transform 1s ease 1.5s;
  }
  #animals.show {
    opacity: 1;
    transform: translateY(0);
  }

  .animal-card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 14px 18px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(6px);
    min-width: 110px;
  }
  .animal-card:hover {
    background: rgba(255,255,255,0.18);
    transform: translateY(-6px) scale(1.05);
    border-color: rgba(255,255,255,0.5);
    box-shadow: 0 8px 30px rgba(168,85,247,0.4);
  }
  .animal-emoji {
    font-size: 32px;
    display: block;
    margin-bottom: 6px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }
  .animal-name {
    color: #f0e6ff;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  .animal-genre {
    color: #c4b5fd;
    font-size: 10px;
    margin-top: 2px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  /* Floating leaves */
  .leaf {
    position: absolute;
    pointer-events: none;
    animation: floatLeaf var(--d) ease-in-out infinite;
    opacity: 0.7;
  }
  @keyframes floatLeaf {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
    50% { transform: translateY(-15px) rotate(180deg); opacity: 1; }
    100% { transform: translateY(0) rotate(360deg); opacity: 0.7; }
  }

  /* Fireflies */
  .firefly {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #bbf7d0;
    box-shadow: 0 0 6px #4ade80, 0 0 12px #86efac;
    animation: drift var(--d) ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes drift {
    0%, 100% { transform: translate(0,0); opacity: 0.2; }
    25% { transform: translate(var(--mx),var(--my)); opacity: 1; }
    75% { transform: translate(calc(var(--mx) * -0.5), calc(var(--my) * 1.5)); opacity: 0.6; }
  }

  /* Story popup */
  #story-popup {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(20, 5, 50, 0.92);
    border: 1px solid rgba(168,85,247,0.6);
    border-radius: 20px;
    padding: 30px 36px;
    text-align: center;
    z-index: 50;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 60px rgba(168,85,247,0.4);
    max-width: 320px;
    width: 90%;
  }
  #story-popup.show { display: block; animation: popIn 0.4s ease; }
  @keyframes popIn {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(0.8); }
    100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  }
  #story-popup h3 { color: #fef3c7; font-size: 20px; margin-bottom: 8px; }
  #story-popup p { color: #c4b5fd; font-size: 13px; line-height: 1.6; margin-bottom: 16px; }
  #story-popup .close-btn {
    background: rgba(168,85,247,0.3);
    border: 1px solid rgba(168,85,247,0.6);
    color: #e9d5ff;
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }
  #story-popup .close-btn:hover { background: rgba(168,85,247,0.6); }
</style>

<script>
const stories = {
  rabbit: {
    emoji: '🐰',
    title: 'Thỏ kể chuyện',
    desc: 'Thỏ bé sẽ dẫn bạn vào những câu chuyện cổ tích đầy phép màu — nơi những điều ước trở thành sự thật và cái thiện luôn chiến thắng.'
  },
  fox: {
    emoji: '🦊',
    title: 'Cáo thông thái',
    desc: 'Cáo thông minh mời bạn cùng phiêu lưu qua những vùng đất xa xôi, khám phá kho báu và giải những câu đố bí ẩn.'
  },
  bear: {
    emoji: '🐻',
    title: 'Gấu ngủ đông',
    desc: 'Gấu bông sẽ kể cho bạn nghe những giấc mơ ngọt ngào — chuyện về những ngôi sao biết hát và những đám mây làm gối.'
  },
  owl: {
    emoji: '🦉',
    title: 'Cú mèo đêm',
    desc: 'Cú mèo huyền bí chia sẻ những câu chuyện về thế giới đêm kỳ ảo — nơi ánh trăng nói chuyện và bóng tối mang điều kỳ diệu.'
  }
};

function openDoor() {
  const doorWrap = document.getElementById('door-wrap');
  const forest = document.getElementById('forest');
  const welcome = document.getElementById('welcome');
  const animals = document.getElementById('animals');
  const world = document.getElementById('world');

  // Spawn particles
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.random() * 360) * Math.PI / 180;
    const dist = 80 + Math.random() * 200;
    const colors = ['#a855f7','#f0abfc','#fbbf24','#86efac','#93c5fd','#f9a8d4'];
    const col = colors[Math.floor(Math.random() * colors.length)];
    const size = 3 + Math.random() * 8;
    p.style.cssText = `
      left: 50%; top: 50%;
      width: ${size}px; height: ${size}px;
      background: ${col};
      box-shadow: 0 0 ${size*2}px ${col};
      --tx: ${Math.cos(angle)*dist}px;
      --ty: ${Math.sin(angle)*dist}px;
      --dur: ${0.6 + Math.random() * 0.8}s;
    `;
    world.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }

  // Fade out door
  doorWrap.style.opacity = '0';
  doorWrap.style.transform = 'translate(-50%,-50%) scale(1.5)';
  doorWrap.style.transition = 'opacity 0.8s, transform 0.8s';

  setTimeout(() => {
    doorWrap.style.display = 'none';
    forest.classList.add('show');

    // Add fireflies
    for (let i = 0; i < 12; i++) {
      const f = document.createElement('div');
      f.className = 'firefly';
      f.style.cssText = `
        left: ${10 + Math.random() * 80}%;
        top: ${30 + Math.random() * 50}%;
        --d: ${3 + Math.random() * 4}s;
        --mx: ${-30 + Math.random() * 60}px;
        --my: ${-30 + Math.random() * 60}px;
        animation-delay: ${Math.random() * 3}s;
      `;
      world.appendChild(f);
    }

    setTimeout(() => {
      welcome.classList.add('show');
      setTimeout(() => animals.classList.add('show'), 800);
    }, 800);
  }, 900);
}

function showStory(type) {
  const s = stories[type];
  document.getElementById('popup-emoji').textContent = s.emoji;
  document.getElementById('popup-title').textContent = s.title;
  document.getElementById('popup-desc').textContent = s.desc;
  document.getElementById('story-popup').classList.add('show');
}

function closePopup() {
  document.getElementById('story-popup').classList.remove('show');
}

// Add background stars
const world = document.getElementById('world');
for (let i = 0; i < 40; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = 1 + Math.random() * 2.5;
  s.style.cssText = `
    left: ${Math.random() * 100}%;
    top: ${Math.random() * 60}%;
    width: ${size}px; height: ${size}px;
    --dur: ${1.5 + Math.random() * 2.5}s;
    animation-delay: ${Math.random() * 3}s;
  `;
  world.appendChild(s);
}
</script>
