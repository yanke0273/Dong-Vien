<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thế Giới Thần Tiên</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
    }

    #world {
      width: 100%;
      height: 100vh;
      min-height: 600px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0520 0%, #1a0a3e 40%, #2d1b69 70%, #1a3a2a 100%);
      cursor: default;
      font-family: 'Georgia', serif;
    }

    /* MOON STYLES */
    #moon-wrap {
      position:absolute;
      top:100px;left:50%;transform:translate(-50%);
      width:110px;height:110px;
      cursor:pointer;
      z-index:35;
    }
    #moon-glow {
      position:absolute;inset:-18px;
      border-radius:50%;
      background:radial-gradient(circle,rgba(254,243,199,.18) 0%,transparent 70%);
      opacity:0;
      transition:opacity .6s ease;
      pointer-events:none;
    }
    #moon-wrap:hover #moon-glow {opacity:1;}
    #moon-body {
      width:110px;height:110px;border-radius:50%;
      background:radial-gradient(circle at 36% 32%, #fffbeb, #fef3c7 38%, #fde68a 70%, #f59e0b 100%);
      box-shadow:0 0 28px rgba(253,230,138,.3),0 0 55px rgba(251,191,36,.15);
      position:relative;overflow:hidden;
      transition:box-shadow .4s;
    }
    #moon-wrap:hover #moon-body {
      box-shadow:0 0 40px rgba(253,230,138,.5),0 0 80px rgba(251,191,36,.28);
    }
    .crater {
      position:absolute;border-radius:50%;
      background:rgba(180,140,0,.18);
      border:1px solid rgba(180,140,0,.1);
    }
    #moon-face {
      position:absolute;inset:0;
      opacity:0;
      transition:opacity .5s ease;
      pointer-events:none;
    }
    #moon-wrap:hover #moon-face {opacity:1;}
    #flash {position:absolute;inset:0;background:white;opacity:0;pointer-events:none;z-index:200;}
    #dark-realm {
      position:absolute;inset:0;
      background:radial-gradient(ellipse at 50% 0%,#1a0030,#06001a 50%,#000008 100%);
      opacity:0;pointer-events:none;z-index:150;
      transition:opacity .8s ease;overflow:hidden;
    }
    #dark-realm.show {opacity:1;pointer-events:all;}
    .dr-star {position:absolute;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite;}
    #dr-moon {
      position:absolute;top:22px;left:50%;transform:translate(-50%);
      width:72px;height:72px;border-radius:50%;
      background:radial-gradient(circle at 36% 32%,#fffbeb,#fde68a 60%,#ca8a04);
      box-shadow:0 0 40px rgba(253,230,138,.5);
      cursor:pointer;transition:transform .3s;
    }
    #dr-moon:hover {transform:translate(-50%) scale(1.08);}
    #dr-content {
      position:absolute;inset:0;z-index:5;
      display:flex;flex-direction:column;align-items:center;
      padding-top:115px;overflow-y:auto;padding-bottom:30px;
    }
    #dr-title {color:#ede9fe;font-size:18px;text-align:center;text-shadow:0 0 18px #9333ea;letter-spacing:2px;margin-bottom:4px;}
    #dr-sub {color:#7c3aed;font-size:11px;letter-spacing:3px;font-family:sans-serif;margin-bottom:22px;}
    #dr-narr {max-width:460px;width:90%;text-align:center;margin-bottom:18px;}
    .dr-l {color:#ddd6fe;font-size:14px;line-height:1.9;opacity:0;transform:translateY(8px);transition:opacity .6s,transform .6s;display:block;font-style:italic;margin:2px 0;}
    .dr-l.v {opacity:1;transform:none;}
    .dr-l.h {color:#f0abfc;font-style:normal;}
    #dr-ch {max-width:460px;width:90%;display:flex;flex-direction:column;gap:10px;}
    .dr-btn {background:rgba(120,0,180,.12);border:1px solid rgba(168,85,247,.35);border-radius:12px;color:#ddd6fe;font-size:14px;padding:13px 18px;cursor:pointer;font-family:'Georgia',serif;text-align:left;transition:all .25s;line-height:1.5;}
    .dr-btn:hover {background:rgba(120,0,180,.28);border-color:#a855f7;transform:translateX(4px);}
    .dr-btn.ok {border-color:#4ade80;background:rgba(74,222,128,.1);color:#bbf7d0;}
    .dr-btn.no {border-color:#f87171;background:rgba(248,113,171,.1);color:#fca5a5;}
    .dr-btn:disabled {cursor:default;transform:none;}
    #dr-fb {max-width:460px;width:90%;margin:14px auto 0;background:rgba(80,0,120,.2);border:1px solid rgba(168,85,247,.35);border-radius:14px;padding:15px 18px;color:#ddd6fe;font-size:13px;line-height:1.7;font-family:sans-serif;display:none;}
    #dr-fb.s {display:block;}
    #dr-inp {max-width:460px;width:90%;margin:14px auto 0;display:none;}
    #dr-txt {width:100%;background:rgba(80,0,120,.2);border:1px solid rgba(168,85,247,.4);border-radius:12px;color:#e9d5ff;font-size:14px;padding:12px 16px;font-family:'Georgia',serif;resize:none;height:72px;outline:none;}
    #dr-txt:focus {border-color:#a855f7;}
    #dr-txt::placeholder {color:rgba(196,181,253,.35);}
    .dr-sub {margin-top:10px;width:100%;background:rgba(120,0,180,.2);border:1px solid rgba(168,85,247,.45);border-radius:12px;color:#e9d5ff;font-size:14px;padding:11px;cursor:pointer;font-family:'Georgia',serif;transition:all .2s;}
    .dr-sub:hover {background:rgba(120,0,180,.4);}
    #dr-escape {position:absolute;bottom:14px;right:14px;z-index:10;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#6b7280;font-size:11px;padding:6px 12px;cursor:pointer;font-family:sans-serif;transition:all .2s;}
    #dr-escape:hover {color:#e5e7eb;}
    .orb {position:absolute;border-radius:50%;filter:blur(22px);animation:orbF var(--d) ease-in-out infinite;pointer-events:none;}
    @keyframes orbF {0%,100%{transform:translate(0,0)}50%{transform:translate(var(--mx),var(--my))}}
    .moon-particle {
      position:absolute;border-radius:50%;
      pointer-events:none;
      animation:floatUp var(--d) ease-out forwards;
      opacity:0;
    }
    @keyframes floatUp {
      0%{transform:translateY(0) scale(1);opacity:0;}
      20%{opacity:.7;}
      100%{transform:translateY(-120px) scale(.3);opacity:0;}
    }

    /* Stars */
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--dur, 2s) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    /* Door */
    #door-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      transition: opacity 0.5s;
    }

    #door-svg {
      filter: drop-shadow(0 0 20px #a78bfa) drop-shadow(0 0 40px #7c3aed);
      cursor: pointer;
      transition: filter 0.3s;
    }
    #door-svg:hover {
      filter: drop-shadow(0 0 30px #f0abfc) drop-shadow(0 0 60px #c084fc);
    }

    .click-hint {
      color: #d4b4fe;
      font-size: 14px;
      margin-top: 12px;
      animation: pulse 2s ease-in-out infinite;
      text-shadow: 0 0 10px #a78bfa;
      letter-spacing: 1px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: flyOut var(--dur) ease-out forwards;
    }
    @keyframes flyOut {
      0% { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
    }

    /* Forest scene */
    #forest {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.5s ease;
      pointer-events: none;
    }
    #forest.show {
      opacity: 1;
      pointer-events: all;
    }
    #forest svg {
      width: 100%;
      height: 100%;
    }

    /* Welcome text */
    #welcome {
      position: absolute;
      top: 220px; /* Di chuyển xuống để không trùng mặt trăng */
      left: 0; right: 0;
      text-align: center;
      color: #fef9c3;
      font-size: 18px;
      text-shadow: 0 0 20px #f59e0b;
      letter-spacing: 1px;
      opacity: 0;
      transform: translateY(-20px);
      transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
      z-index: 40; /* Z-index cao hơn mặt trăng */
      font-family: 'Georgia', serif;
      line-height: 1.6;
      padding: 0 20px;
    }
    #welcome.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Animal cards */
    #animals {
      position: absolute;
      bottom: 20px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 0 15px;
      z-index: 30;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 1s ease 1.5s, transform 1s ease 1.5s;
    }
    #animals.show {
      opacity: 1;
      transform: translateY(0);
    }

    .animal-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 16px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(6px);
      min-width: 90px;
      text-decoration: none;
      display: block;
    }
    .animal-card:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-6px) scale(1.05);
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 8px 30px rgba(167,139,250,0.4);
    }
    .animal-emoji {
      font-size: 32px;
      display: block;
      margin-bottom: 6px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }
    .animal-name {
      color: #f0e6ff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    .animal-genre {
      color: #c4b5fd;
      font-size: 10px;
      margin-top: 2px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    /* Floating leaves */
    .leaf {
      position: absolute;
      pointer-events: none;
      animation: floatLeaf var(--d) ease-in-out infinite;
      opacity: 0.7;
    }
    @keyframes floatLeaf {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
      50% { transform: translateY(-15px) rotate(180deg); opacity: 1; }
      100% { transform: translateY(0) rotate(360deg); opacity: 0.7; }
    }

    /* Fireflies */
    .firefly {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #bbf7d0;
      box-shadow: 0 0 6px #4ade80, 0 0 12px #86efac;
      animation: drift var(--d) ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes drift {
      0%, 100% { transform: translate(0,0); opacity: 0.2; }
      25% { transform: translate(var(--mx),var(--my)); opacity: 1; }
      75% { transform: translate(calc(var(--mx) * -0.5), calc(var(--my) * 1.5)); opacity: 0.6; }
    }
  </style>
</head>
<body>

<div id="world" role="main" aria-label="Thế giới thần tiên">

  <!-- Door scene -->
  <div id="door-wrap">
    <svg id="door-svg" width="200" height="280" viewBox="0 0 200 280" onclick="openDoor()">
      <!-- Door frame -->
      <rect x="20" y="10" width="160" height="260" rx="80" fill="none" stroke="#7c3aed" stroke-width="3"/>
      <rect x="20" y="10" width="160" height="260" rx="80" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.5"/>
      <!-- Door body -->
      <rect x="30" y="20" width="140" height="240" rx="70" fill="#1e0a4e" opacity="0.9"/>
      <!-- Door glow rings -->
      <rect x="30" y="20" width="140" height="240" rx="70" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
      <!-- Vines left -->
      <path d="M20 80 Q5 100 15 130 Q0 150 10 180" fill="none" stroke="#166534" stroke-width="2"/>
      <circle cx="8" cy="105" r="8" fill="#16a34a" opacity="0.8"/>
      <circle cx="3" cy="145" r="6" fill="#15803d" opacity="0.7"/>
      <circle cx="7" cy="170" r="7" fill="#22c55e" opacity="0.6"/>
      <!-- Vines right -->
      <path d="M180 80 Q195 100 185 130 Q200 150 190 180" fill="none" stroke="#166534" stroke-width="2"/>
      <circle cx="192" cy="105" r="8" fill="#16a34a" opacity="0.8"/>
      <circle cx="197" cy="145" r="6" fill="#15803d" opacity="0.7"/>
      <circle cx="193" cy="170" r="7" fill="#22c55e" opacity="0.6"/>
      <!-- Flowers on door -->
      <circle cx="100" cy="100" r="5" fill="#f9a8d4"/>
      <circle cx="95" cy="95" r="3" fill="#f472b6"/>
      <circle cx="105" cy="95" r="3" fill="#f472b6"/>
      <circle cx="100" cy="90" r="3" fill="#f472b6"/>
      <circle cx="100" cy="100" r="3" fill="#fbbf24"/>
      <!-- Door handle -->
      <circle cx="130" cy="150" r="7" fill="#fbbf24" opacity="0.9"/>
      <circle cx="130" cy="150" r="4" fill="#f59e0b"/>
      <!-- Magical symbols -->
      <text x="100" y="200" text-anchor="middle" fill="#a78bfa" font-size="28" opacity="0.6">✦</text>
      <text x="70" y="160" text-anchor="middle" fill="#7c3aed" font-size="14" opacity="0.5">✧</text>
      <text x="130" y="130" text-anchor="middle" fill="#7c3aed" font-size="14" opacity="0.5">✧</text>
    </svg>
    <div class="click-hint">✨ Chạm để mở cánh cửa ✨</div>
  </div>

  <!-- Forest scene (hidden initially) -->
  <div id="forest">
    <svg width="100%" height="100%" viewBox="0 0 680 600" preserveAspectRatio="xMidYMid slice">
      <!-- Sky gradient -->
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0f0035"/>
          <stop offset="60%" stop-color="#1a0a4e"/>
          <stop offset="100%" stop-color="#0d3320"/>
        </linearGradient>
      </defs>
      <rect width="680" height="600" fill="url(#sky)"/>
      <!-- Stars -->
      <circle cx="60" cy="40" r="1.5" fill="white" opacity="0.8"/>
      <circle cx="140" cy="25" r="1" fill="white" opacity="0.6"/>
      <circle cx="220" cy="55" r="1.5" fill="white" opacity="0.9"/>
      <circle cx="460" cy="30" r="1" fill="white" opacity="0.7"/>
      <circle cx="550" cy="50" r="1.5" fill="white" opacity="0.8"/>
      <circle cx="620" cy="25" r="1" fill="white" opacity="0.6"/>
      <circle cx="180" cy="70" r="1" fill="white" opacity="0.5"/>
      <circle cx="500" cy="65" r="1.5" fill="white" opacity="0.7"/>
      <!-- Ground -->
      <ellipse cx="340" cy="580" rx="380" ry="100" fill="#0d4a20" opacity="0.8"/>
      <rect x="0" y="500" width="680" height="100" fill="#0a3d1a"/>
      <!-- Grass tufts -->
      <path d="M0 500 Q20 480 40 500 Q60 480 80 500 Q100 480 120 500 Q140 480 160 500 Q180 480 200 500 Q220 480 240 500 Q260 480 280 500 Q300 480 320 500 Q340 480 360 500 Q380 480 400 500 Q420 480 440 500 Q460 480 480 500 Q500 480 520 500 Q540 480 560 500 Q580 480 600 500 Q620 480 640 500 Q660 480 680 500 L680 600 L0 600Z" fill="#0d4a20"/>
      <!-- Trees left cluster -->
      <rect x="20" y="280" width="18" height="240" fill="#3d1f00"/>
      <ellipse cx="29" cy="250" rx="45" ry="80" fill="#14532d"/>
      <ellipse cx="29" cy="210" rx="35" ry="60" fill="#166534"/>
      <ellipse cx="29" cy="175" rx="22" ry="45" fill="#15803d"/>
      <circle cx="55" cy="230" r="8" fill="#f9a8d4" opacity="0.8"/>
      <circle cx="10" cy="200" r="6" fill="#fbcfe8" opacity="0.7"/>
      <circle cx="35" cy="185" r="5" fill="#f472b6" opacity="0.8"/>

      <rect x="80" y="320" width="14" height="200" fill="#3d1f00"/>
      <ellipse cx="87" cy="295" rx="38" ry="65" fill="#166534"/>
      <ellipse cx="87" cy="260" rx="28" ry="50" fill="#16a34a"/>

      <!-- Trees right cluster -->
      <rect x="640" y="280" width="18" height="240" fill="#3d1f00"/>
      <ellipse cx="649" cy="250" rx="45" ry="80" fill="#14532d"/>
      <ellipse cx="649" cy="210" rx="35" ry="60" fill="#166534"/>
      <ellipse cx="649" cy="175" rx="22" ry="45" fill="#15803d"/>
      <circle cx="625" cy="225" r="8" fill="#f9a8d4" opacity="0.8"/>
      <circle cx="668" cy="200" r="6" fill="#fbcfe8" opacity="0.7"/>

      <rect x="580" y="320" width="14" height="200" fill="#3d1f00"/>
      <ellipse cx="587" cy="295" rx="38" ry="65" fill="#166534"/>
      <ellipse cx="587" cy="260" rx="28" ry="50" fill="#16a34a"/>

      <!-- Middle trees -->
      <rect x="160" y="350" width="12" height="170" fill="#3d1f00"/>
      <ellipse cx="166" cy="325" rx="32" ry="55" fill="#166534"/>
      <ellipse cx="166" cy="295" rx="24" ry="42" fill="#22c55e" opacity="0.8"/>

      <rect x="490" y="350" width="12" height="170" fill="#3d1f00"/>
      <ellipse cx="496" cy="325" rx="32" ry="55" fill="#166534"/>
      <ellipse cx="496" cy="295" rx="24" ry="42" fill="#22c55e" opacity="0.8"/>

      <!-- Mushrooms -->
      <rect x="230" y="480" width="8" height="25" fill="#fde8d8" rx="2"/>
      <ellipse cx="234" cy="478" rx="18" ry="12" fill="#dc2626"/>
      <circle cx="228" cy="474" r="3" fill="white" opacity="0.8"/>
      <circle cx="237" cy="471" r="2.5" fill="white" opacity="0.8"/>
      <circle cx="240" cy="478" r="2" fill="white" opacity="0.8"/>

      <rect x="420" y="480" width="8" height="25" fill="#fde8d8" rx="2"/>
      <ellipse cx="424" cy="478" rx="18" ry="12" fill="#dc2626"/>
      <circle cx="418" cy="474" r="3" fill="white" opacity="0.8"/>
      <circle cx="427" cy="471" r="2.5" fill="white" opacity="0.8"/>

      <!-- Path -->
      <path d="M240 600 Q300 560 340 520 Q380 560 440 600" fill="#2d4a1e" opacity="0.5"/>

      <!-- Flowers in ground -->
      <circle cx="200" cy="490" r="4" fill="#fbbf24"/>
      <circle cx="280" cy="488" r="3" fill="#f9a8d4"/>
      <circle cx="360" cy="492" r="4" fill="#a78bfa"/>
      <circle cx="440" cy="487" r="3" fill="#fbbf24"/>
      <circle cx="500" cy="491" r="4" fill="#f9a8d4"/>

      <!-- Vines hanging -->
      <path d="M100 0 Q95 80 105 160 Q100 240 95 280" fill="none" stroke="#166534" stroke-width="2" opacity="0.7"/>
      <circle cx="98" cy="90" r="5" fill="#16a34a" opacity="0.8"/>
      <circle cx="103" cy="150" r="6" fill="#14532d" opacity="0.7"/>
      <circle cx="97" cy="210" r="5" fill="#15803d" opacity="0.8"/>
      <circle cx="94" cy="265" r="7" fill="#f9a8d4" opacity="0.8"/>

      <path d="M580 0 Q585 80 575 160 Q580 240 585 280" fill="none" stroke="#166534" stroke-width="2" opacity="0.7"/>
      <circle cx="582" cy="90" r="5" fill="#16a34a" opacity="0.8"/>
      <circle cx="577" cy="150" r="6" fill="#14532d" opacity="0.7"/>
      <circle cx="583" cy="210" r="5" fill="#15803d" opacity="0.8"/>
      <circle cx="586" cy="265" r="7" fill="#fbcfe8" opacity="0.8"/>
    </svg>

    <!-- INTERACTIVE MOON -->
    <div id="moon-wrap" onclick="moonClick()">
      <div id="moon-glow"></div>
      <div id="moon-body">
        <div class="crater" style="width:18px;height:18px;top:18px;left:22px;"></div>
        <div class="crater" style="width:10px;height:10px;top:38px;right:18px;"></div>
        <div class="crater" style="width:14px;height:14px;bottom:22px;left:30px;"></div>
        <div class="crater" style="width:8px;height:8px;bottom:30px;right:25px;"></div>
      </div>
      <svg id="moon-face" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
        <g id="eye-l-g"><ellipse id="eye-l" cx="38" cy="44" rx="7" ry="7" fill="#92400e"/></g>
        <g id="eye-r-g"><ellipse id="eye-r" cx="72" cy="44" rx="7" ry="7" fill="#92400e"/></g>
        <path id="mouth" d="M38 68 Q55 80 72 68" fill="none" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>
        <path id="brow-l" d="M30 34 Q38 30 46 34" fill="none" stroke="#92400e" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <path id="brow-r" d="M64 34 Q72 30 80 34" fill="none" stroke="#92400e" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
        <ellipse id="blush-l" cx="28" cy="58" rx="9" ry="5" fill="#f87171" opacity=".25"/>
        <ellipse id="blush-r" cx="82" cy="58" rx="9" ry="5" fill="#f87171" opacity=".25"/>
        <g id="teeth" opacity="0">
          <rect x="44" y="70" width="7" height="8" rx="2" fill="white"/>
          <rect x="53" y="70" width="7" height="8" rx="2" fill="white"/>
          <rect x="62" y="70" width="7" height="8" rx="2" fill="white"/>
        </g>
        <circle id="pupil-l" cx="38" cy="44" r="3.5" fill="#1a0a00" opacity="0"/>
        <circle id="pupil-r" cx="72" cy="44" r="3.5" fill="#1a0a00" opacity="0"/>
      </svg>
    </div>
  </div>

<script>
function openDoor() {
  const doorWrap = document.getElementById('door-wrap');
  const forest = document.getElementById('forest');
  const welcome = document.getElementById('welcome');
  const animals = document.getElementById('animals');
  const world = document.getElementById('world');

  // Spawn particles
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.random() * 360) * Math.PI / 180;
    const dist = 80 + Math.random() * 200;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    const size = 3 + Math.random() * 6;
    const colors = ['#a78bfa', '#f472b6', '#fbbf24', '#34d399'];
    const color = colors[Math.floor(Math.random() * colors.length)];
    const dur = 0.6 + Math.random() * 1.2;
    p.style.left = '50%';
    p.style.top = '50%';
    p.style.width = `${size}px`;
    p.style.height = `${size}px`;
    p.style.background = color;
    p.style.setProperty('--tx', `${tx}px`);
    p.style.setProperty('--ty', `${ty}px`);
    p.style.setProperty('--dur', `${dur}s`);
    world.appendChild(p);
    setTimeout(() => p.remove(), 2000);
  }

  // Hide door and show forest
  doorWrap.style.opacity = '0';
  setTimeout(() => {
    doorWrap.style.display = 'none';
    forest.classList.add('show');
    welcome.classList.add('show');
    animals.classList.add('show');

    // Init dark realm stars
    const drStars = document.getElementById('dr-stars');
    const drColors = ['#c4b5fd','#f0abfc','#818cf8','#a78bfa','#e879f9'];
    for(let i = 0; i < 65; i++) {
      const s = document.createElement('div');
      s.className = 'dr-star';
      const sz = 1 + Math.random() * 3;
      s.style.left = `${Math.random() * 100}%`;
      s.style.top = `${Math.random() * 100}%`;
      s.style.width = `${sz}px`;
      s.style.height = `${sz}px`;
      s.style.background = drColors[i % 5];
      s.style.setProperty('--d', `${1.5 + Math.random() * 4}s`);
      s.style.animationDelay = `${Math.random() * 5}s`;
      drStars.appendChild(s);
    }
  }, 400);
}

// Create stars
for (let i = 0; i < 80; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = `${Math.random() * 100}%`;
  star.style.top = `${Math.random() * 60}%`;
  star.style.width = `${1 + Math.random() * 2}px`;
  star.style.height = star.style.width;
  star.style.setProperty('--dur', `${1 + Math.random() * 3}s`);
  star.style.animationDelay = `${Math.random() * 2}s`;
  document.getElementById('world').appendChild(star);
}

// Create fireflies
for (let i = 0; i < 15; i++) {
  const firefly = document.createElement('div');
  firefly.className = 'firefly';
  firefly.style.left = `${10 + Math.random() * 80}%`;
  firefly.style.top = `${20 + Math.random() * 70}%`;
  firefly.style.setProperty('--d', `${3 + Math.random() * 4}s`);
  firefly.style.setProperty('--mx', `${-30 + Math.random() * 60}px`);
  firefly.style.setProperty('--my', `${-20 + Math.random() * 40}px`);
  firefly.style.animationDelay = `${Math.random() * 3}s`;
  document.getElementById('forest').appendChild(firefly);
}

// ====================
// MOON & DARK REALM
// ====================
let moonStage = 0;
let evilDone = false;

const eyeL = document.getElementById('eye-l');
const eyeR = document.getElementById('eye-r');
const mouth = document.getElementById('mouth');
const browL = document.getElementById('brow-l');
const browR = document.getElementById('brow-r');
const blushL = document.getElementById('blush-l');
const blushR = document.getElementById('blush-r');
const teeth = document.getElementById('teeth');
const pupilL = document.getElementById('pupil-l');
const pupilR = document.getElementById('pupil-r');
const moonBody = document.getElementById('moon-body');

const stages = [
  // 0 - calm smile
  () => {
    eyeL.setAttribute('ry','7'); eyeR.setAttribute('ry','7');
    eyeL.setAttribute('cy','44'); eyeR.setAttribute('cy','44');
    eyeL.setAttribute('fill','#92400e'); eyeR.setAttribute('fill','#92400e');
    mouth.setAttribute('d','M38 68 Q55 80 72 68');
    mouth.setAttribute('stroke','#92400e');
    browL.setAttribute('opacity','0'); browR.setAttribute('opacity','0');
    blushL.setAttribute('opacity','.25'); blushR.setAttribute('opacity','.25');
    teeth.setAttribute('opacity','0');
    pupilL.setAttribute('opacity','0'); pupilR.setAttribute('opacity','0');
    moonBody.style.background='radial-gradient(circle at 36% 32%, #fffbeb, #fef3c7 38%, #fde68a 70%, #f59e0b 100%)';
  },
  // 1 - curious
  () => {
    eyeL.setAttribute('ry','8'); eyeR.setAttribute('ry','8');
    eyeL.setAttribute('cy','43'); eyeR.setAttribute('cy','43');
    eyeL.setAttribute('fill','#78350f'); eyeR.setAttribute('fill','#78350f');
    mouth.setAttribute('d','M42 67 Q55 73 68 67');
    browL.setAttribute('d','M30 32 Q38 27 46 32');
    browR.setAttribute('d','M64 32 Q72 27 80 32');
    browL.setAttribute('opacity','1'); browR.setAttribute('opacity','1');
    blushL.setAttribute('opacity','.12'); blushR.setAttribute('opacity','.12');
    teeth.setAttribute('opacity','0');
    pupilL.setAttribute('opacity','0'); pupilR.setAttribute('opacity','0');
    moonBody.style.background='radial-gradient(circle at 36% 32%, #fffbeb, #fef3c7 38%, #fde68a 70%, #f59e0b 100%)';
  },
  // 2 - suspicious
  () => {
    eyeL.setAttribute('ry','5'); eyeR.setAttribute('ry','8');
    eyeL.setAttribute('cy','44'); eyeR.setAttribute('cy','42');
    eyeL.setAttribute('fill','#78350f'); eyeR.setAttribute('fill','#78350f');
    mouth.setAttribute('d','M40 68 Q52 72 65 65');
    browL.setAttribute('d','M30 36 Q38 34 46 36');
    browR.setAttribute('d','M64 30 Q72 25 80 30');
    browL.setAttribute('opacity','1'); browR.setAttribute('opacity','1');
    blushL.setAttribute('opacity','0'); blushR.setAttribute('opacity','0');
    teeth.setAttribute('opacity','0');
    pupilL.setAttribute('opacity','.6'); pupilR.setAttribute('opacity','.6');
    pupilL.setAttribute('cx','38'); pupilR.setAttribute('cx','72');
    pupilL.setAttribute('cy','44'); pupilR.setAttribute('cy','42');
    moonBody.style.background='radial-gradient(circle at 36% 32%, #fef9c3, #fde68a 45%, #ca8a04 80%, #a16207 100%)';
  },
  // 3 - shocked
  () => {
    eyeL.setAttribute('ry','10'); eyeR.setAttribute('ry','10');
    eyeL.setAttribute('cy','43'); eyeR.setAttribute('cy','43');
    eyeL.setAttribute('fill','#7f1d1d'); eyeR.setAttribute('fill','#7f1d1d');
    mouth.setAttribute('d','M42 65 Q55 82 68 65');
    browL.setAttribute('d','M28 30 Q38 24 46 30');
    browR.setAttribute('d','M64 30 Q72 24 82 30');
    browL.setAttribute('opacity','1'); browR.setAttribute('opacity','1');
    blushL.setAttribute('opacity','0'); blushR.setAttribute('opacity','0');
    teeth.setAttribute('opacity','1');
    pupilL.setAttribute('opacity','.8'); pupilR.setAttribute('opacity','.8');
    pupilL.setAttribute('cx','37'); pupilR.setAttribute('cx','73');
    pupilL.setAttribute('cy','43'); pupilR.setAttribute('cy','43');
    pupilL.setAttribute('r','4'); pupilR.setAttribute('r','4');
    moonBody.style.background='radial-gradient(circle at 36% 32%, #fefce8, #fde68a 40%, #b45309 80%, #78350f 100%)';
    shake(document.getElementById('moon-wrap'));
  },
  // 4 - evil
  () => {
    eyeL.setAttribute('ry','9'); eyeR.setAttribute('ry','9');
    eyeL.setAttribute('cy','44'); eyeR.setAttribute('cy','44');
    eyeL.setAttribute('fill','#dc2626'); eyeR.setAttribute('fill','#dc2626');
    mouth.setAttribute('d','M32 62 Q38 54 44 62 Q55 74 66 62 Q72 54 78 62');
    mouth.setAttribute('stroke','#7f1d1d');
    browL.setAttribute('d','M28 33 Q38 26 46 33');
    browR.setAttribute('d','M64 33 Q72 26 82 33');
    browL.setAttribute('opacity','1'); browR.setAttribute('opacity','1');
    blushL.setAttribute('opacity','0'); blushR.setAttribute('opacity','0');
    teeth.setAttribute('opacity','0');
    pupilL.setAttribute('opacity','1'); pupilR.setAttribute('opacity','1');
    pupilL.setAttribute('cx','38'); pupilR.setAttribute('cx','72');
    pupilL.setAttribute('cy','44'); pupilR.setAttribute('cy','44');
    pupilL.setAttribute('r','4.5'); pupilR.setAttribute('r','4.5');
    moonBody.style.background='radial-gradient(circle at 36% 32%, #fef9c3, #fbbf24 40%, #92400e 75%, #451a03 100%)';
    moonBody.style.boxShadow='0 0 50px rgba(220,38,38,.6), 0 0 100px rgba(220,38,38,.3)';
  }
];

function applyStage(n) {
  stages[n]();
}

function shake(el) {
  let i=0;
  const t=setInterval(() => {
    el.style.transform=`translate(-50%) rotate(${i%2?'5':'-5'}deg) scale(1.1)`;
    if(++i>9){clearInterval(t); el.style.transform='translate(-50%)';}
  },55);
}

function spawnParticles() {
  const colors=['#a855f7','#f0abfc','#fbbf24','#86efac','#93c5fd','#f9a8d4'];
  for(let i=0; i<14; i++) {
    const p=document.createElement('div'); p.className='moon-particle';
    const angle=Math.random()*Math.PI*2;
    const dist=60+Math.random()*80;
    const col=colors[Math.floor(Math.random()*colors.length)];
    const sz=3+Math.random()*6;
    p.style.left=`${55+Math.cos(angle)*dist}px`;
    p.style.top=`${55+Math.sin(angle)*dist}px`;
    p.style.width=`${sz}px`;
    p.style.height=`${sz}px`;
    p.style.background=col;
    p.style.boxShadow=`0 0 ${sz*2}px ${col}`;
    document.getElementById('forest').appendChild(p);
    setTimeout(()=>p.remove(), 1200);
  }
}

function moonClick() {
  if(evilDone) return;
  moonStage = Math.min(moonStage+1, 4);
  applyStage(moonStage);
  spawnParticles();

  if(moonStage === 4) {
    evilDone = true;
    setTimeout(triggerEvil, 700);
  }
}

function triggerEvil() {
  const fl = document.getElementById('flash');
  fl.style.transition='opacity .08s'; fl.style.opacity='1';
  setTimeout(() => {
    fl.style.transition='opacity .5s'; fl.style.opacity='0';
    const mw = document.getElementById('moon-wrap');
    mw.style.transition='all .7s cubic-bezier(.4,0,.2,1)';
    mw.style.width='400px'; mw.style.height='400px';
    mw.style.top='50%'; mw.style.transform='translate(-50%,-50%)';
    mw.style.zIndex='150';
    setTimeout(() => {
      document.getElementById('dark-realm').classList.add('show');
      mw.style.opacity='0';
      setTimeout(() => { mw.style.display='none'; drStart(); },600);
    },600);
  },120);
}

let drDone=[false,false,false];

const drScenes = [
  {
    lines: [
      {t:'Mặt trăng nở nụ cười.'},
      {t:'Và bạn rơi — không phải xuống, mà vào trong.'},
      {t:'"Chào mừng đến nơi những điều bị lãng quên sinh sống."',h:1},
      {t:'"Bạn không được mời. Nhưng bạn đã đến."',h:1},
      {t:'"Trả lời ba câu hỏi — ta sẽ thả người."',h:1},
    ],
    choices:[{l:'Tôi đồng ý.',next:1}]
  },
  {
    lines: [
      {t:'Câu hỏi thứ nhất.'},
      {t:'"Thứ nào sau đây không bao giờ có thể lấy lại?"',h:1},
    ],
    choices: [
      {l:'Tiền bạc',msg:'Mặt trăng lắc đầu. "Tiền mất có thể kiếm lại." Thử lại.'},
      {l:'Sức khỏe',msg:'Mặt trăng nhếch miệng. "Đôi khi sức khỏe hồi phục được." Thử lại.'},
      {l:'Thời gian',ok:1,msg:'Mặt trăng im lặng rất lâu.\n"Đúng. Mỗi giây trôi qua — không bao giờ quay lại. Đó là thứ ta thật sự đánh cắp của người."',next:2},
      {l:'Niềm tin',msg:'Mặt trăng lắc đầu. "Niềm tin đôi khi được xây dựng lại." Thử lại.'},
    ]
  },
  {
    lines: [
      {t:'Câu hỏi thứ hai.'},
      {t:'"Thỏ, Cáo, Gấu, Cú — ai đang nói dối chính mình?"',h:1},
    ],
    choices: [
      {l:'Thỏ — nói mình chạy vì tự do',msg:'Gần đúng... nhưng Thỏ biết mình đang trốn chạy.'},
      {l:'Cáo — dùng trí tuệ thay vì cho phép mình dễ bị tổn thương',ok:1,msg:'Mặt trăng gật đầu chậm.\n"Đúng. Thông minh dễ hơn là dũng cảm đủ để yêu và được yêu."',next:3},
      {l:'Gấu — nói mình ngủ vì cần nghỉ',msg:'Gấu biết mình không ngủ vì mệt. Nhưng đó không phải lời dối với bản thân.'},
      {l:'Cú — nói mình một mình vì muốn vậy',msg:'Cú cô đơn và biết rõ điều đó.'},
    ]
  },
  {
    lines: [
      {t:'Câu hỏi cuối.'},
      {t:'"Tại sao bạn chạm vào mặt trăng?"',h:1},
      {t:'Mặt trăng nhìn thẳng vào mắt bạn.'},
      {t:'"Hãy nói thật."',h:1},
    ],
    type:'input'
  }
];

function drStart() {
  setTimeout(() => drRender(0), 500);
}

function drRender(idx) {
  const sc = drScenes[idx]; if(!sc) return;
  const narr = document.getElementById('dr-narr'); narr.innerHTML='';
  sc.lines.forEach((l,i) => {
    const s=document.createElement('span');
    s.className='dr-l'+(l.h?' h':'');
    s.textContent=l.t; narr.appendChild(s);
    setTimeout(()=>s.classList.add('v'), 180+i*300);
  });
  const ch = document.getElementById('dr-ch'); ch.innerHTML='';
  document.getElementById('dr-fb').className=''; document.getElementById('dr-fb').innerHTML='';
  document.getElementById('dr-inp').style.display='none'; document.getElementById('dr-inp').innerHTML='';
  drDone[idx]=false;
  const delay = sc.lines.length*300+400;

  if(sc.type === 'input') {
    setTimeout(() => {
      const ip=document.getElementById('dr-inp'); ip.style.display='block';
      ip.innerHTML='<textarea id="dr-txt" placeholder="Nói thật với mặt trăng..."></textarea><button class="dr-sub" onclick="drSubmit()">Trả lời ✦</button>';
    }, delay);
  } else if(sc.choices) {
    setTimeout(() => {
      sc.choices.forEach((c,i) => {
        const b=document.createElement('button'); b.className='dr-btn'; b.textContent=c.l;
        b.onclick=()=>drChoice(idx,i,c); ch.appendChild(b);
      });
    }, delay);
  }
}

function drChoice(scIdx,btnIdx,c) {
  if(drDone[scIdx]) return;
  const btns=document.querySelectorAll('.dr-btn');
  const fb=document.getElementById('dr-fb');
  if(c.ok) {
    drDone[scIdx]=true;
    btns.forEach((b,i) => {b.disabled=true; if(i===btnIdx) b.classList.add('ok');});
    fb.innerHTML='<strong style="color:#4ade80">✓</strong> ' + c.msg.replace(/\n/g,'<br><br>');
    fb.className='s';
    if(c.next !== undefined) setTimeout(()=>drRender(c.next), 2400);
  } else {
    btns.forEach((b,i) => {b.disabled=true; if(i===btnIdx) b.classList.add('no');});
    fb.innerHTML='<span style="color:#fca5a5">' + (c.msg||'Sai rồi.') + '</span>';
    fb.className='s';
    setTimeout(()=>{
      btns.forEach(b=>{b.disabled=false; b.classList.remove('ok','no');});
      drDone[scIdx]=false; fb.className=''; fb.innerHTML='';
    },2200);
  }
}

function drSubmit() {
  const v=document.getElementById('dr-txt').value.trim(); if(!v) return;
  document.getElementById('dr-inp').innerHTML='<div style="text-align:center;padding:10px 0;"><em style="color:#ddd6fe;font-size:14px;font-family:Georgia,serif;">"' + v + '"</em></div>';
  const fb=document.getElementById('dr-fb');
  fb.innerHTML='Mặt trăng nhìn câu trả lời của bạn rất lâu.<br><br><em style="color:#f0abfc">"Tất cả những ai chạm vào ta đều nghĩ mình chỉ tò mò."</em><br><br><span style="color:#ddd6fe">"Nhưng thật ra — họ đang tìm kiếm điều gì đó mà ánh sáng ban ngày không thể cho."</span><br><br><em style="color:#c4b5fd">"Ta sẽ nhớ câu trả lời này."</em>';
  fb.className='s';
  setTimeout(()=>{
    document.getElementById('dr-ch').innerHTML='<div style="background:rgba(120,0,180,.15);border:1px solid rgba(168,85,247,.4);border-radius:14px;padding:20px;text-align:center;margin-top:10px;"><div style="font-size:12px;color:#f0abfc;letter-spacing:2px;margin-bottom:10px;font-family:sans-serif;">🌑 BÍ MẬT CUỐI CÙNG 🌑</div><p style="color:#ddd6fe;font-size:13px;line-height:1.85;font-family:sans-serif;">Thỏ, Cáo, Gấu, Cú — họ không phải bốn nhân vật khác nhau.<br><strong style="color:#f0abfc">Họ là bốn phần của cùng một người.</strong><br><br>Người chạy trốn. Người che giấu. Người ngủ quên. Người giữ im lặng.<br><em style="color:#c4b5fd">Và mặt trăng biết tất cả.</em></p><button class="dr-btn" style="margin-top:16px;text-align:center;border-color:rgba(168,85,247,.5);" onclick="escapeRealm()">Rời khỏi không gian này ↩</button></div>';
  },3200);
}

function escapeRealm() {
  const dr=document.getElementById('dark-realm');
  const fl=document.getElementById('flash');
  fl.style.transition='opacity .1s'; fl.style.opacity='1';
  setTimeout(() => {
    dr.style.opacity='0';
    fl.style.transition='opacity .5s'; fl.style.opacity='0';
    setTimeout(() => {
      dr.classList.remove('show'); dr.style.opacity='';
      evilDone=false; moonStage=0;
      const mw=document.getElementById('moon-wrap');
      mw.style.cssText='position:absolute;top:100px;left:50%;transform:translate(-50%);width:110px;height:110px;cursor:pointer;z-index:35;';
      mw.style.display=''; mw.style.opacity='1';
      moonBody.style.background='radial-gradient(circle at 36% 32%, #fffbeb, #fef3c7 38%, #fde68a 70%, #f59e0b 100%)';
      moonBody.style.boxShadow='0 0 28px rgba(253,230,138,.3), 0 0 55px rgba(251,191,36,.15)';
      applyStage(0);
      document.getElementById('moon-face').style.opacity='0';
    },900);
  },150);
}

applyStage(0);
</script>
