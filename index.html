
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thế Giới Thần Tiên</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; }

    #world {
      width: 100%;
      min-height: 600px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0520 0%, #1a0a3e 40%, #2d1b69 70%, #1a3a2a 100%);
      cursor: pointer;
      border-radius: 16px;
      font-family: 'Georgia', serif;
    }

    /* Stars */
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--dur, 2s) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    /* Door */
    #door-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      transition: opacity 0.5s;
    }

    #door-svg {
      filter: drop-shadow(0 0 20px #a855f7) drop-shadow(0 0 40px #7c3aed);
      cursor: pointer;
      transition: filter 0.3s;
    }
    #door-svg:hover {
      filter: drop-shadow(0 0 30px #f0abfc) drop-shadow(0 0 60px #c084fc);
    }

    .click-hint {
      color: #d4b4fe;
      font-size: 14px;
      margin-top: 12px;
      animation: pulse 2s ease-in-out infinite;
      text-shadow: 0 0 10px #a855f7;
      letter-spacing: 1px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: flyOut var(--dur) ease-out forwards;
    }
    @keyframes flyOut {
      0% { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
    }

    /* Forest scene */
    #forest {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.5s ease;
      pointer-events: none;
    }
    #forest.show {
      opacity: 1;
      pointer-events: all;
    }

    /* Welcome text */
    #welcome {
      position: absolute;
      top: 60px;
      left: 0; right: 0;
      text-align: center;
      color: #fef3c7;
      font-size: 22px;
      text-shadow: 0 0 20px #f59e0b;
      letter-spacing: 2px;
      opacity: 0;
      transform: translateY(-20px);
      transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
      z-index: 20;
      font-family: 'Georgia', serif;
      line-height: 1.6;
    }
    #welcome.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Animal cards */
    #animals {
      position: absolute;
      bottom: 30px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 0 20px;
      z-index: 30;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 1s ease 1.5s, transform 1s ease 1.5s;
    }
    #animals.show {
      opacity: 1;
      transform: translateY(0);
    }

    .animal-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 14px 18px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(6px);
      min-width: 110px;
    }
    .animal-card:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-6px) scale(1.05);
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 8px 30px rgba(168,85,247,0.4);
    }
    .animal-emoji {
      font-size: 32px;
      display: block;
      margin-bottom: 6px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }
    .animal-name {
      color: #f0e6ff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    .animal-genre {
      color: #c4b5fd;
      font-size: 10px;
      margin-top: 2px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    /* Floating leaves */
    .leaf {
      position: absolute;
      pointer-events: none;
      animation: floatLeaf var(--d) ease-in-out infinite;
      opacity: 0.7;
    }
    @keyframes floatLeaf {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
      50% { transform: translateY(-15px) rotate(180deg); opacity: 1; }
      100% { transform: translateY(0) rotate(360deg); opacity: 0.7; }
    }

    /* Fireflies */
    .firefly {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #bbf7d0;
      box-shadow: 0 0 6px #4ade80, 0 0 12px #86efac;
      animation: drift var(--d) ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes drift {
      0%, 100% { transform: translate(0,0); opacity: 0.2; }
      25% { transform: translate(var(--mx),var(--my)); opacity: 1; }
      75% { transform: translate(calc(var(--mx) * -0.5), calc(var(--my) * 1.5)); opacity: 0.6; }
    }

    /* Story popup */
    #story-popup {
      display: none;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20, 5, 50, 0.92);
      border: 1px solid rgba(168,85,247,0.6);
      border-radius: 20px;
      padding: 30px 36px;
      text-align: center;
      z-index: 50;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 60px rgba(168,85,247,0.4);
      max-width: 320px;
      width: 90%;
    }
    #story-popup.show { display: block; animation: popIn 0.4s ease; }
    @keyframes popIn {
      0% { opacity: 0; transform: translate(-50%,-50%) scale(0.8); }
      100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    }
    #story-popup h3 { color: #fef3c7; font-size: 20px; margin-bottom: 6px; }
    #story-popup p { color: #c4b5fd; font-size: 13px; line-height: 1.6; margin-bottom: 16px; }
    #story-popup .close-btn {
      background: rgba(168,85,247,0.3);
      border: 1px solid rgba(168,85,247,0.6);
      color: #e9d5ff;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    #story-popup .close-btn:hover { background: rgba(168,85,247,0.6); }

    /* Game styles */
    #game {
      display: none;
      width: 100%;
      min-height: 700px;
      background: #0a0520;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      font-family: 'Georgia', serif;
    }
    #game.show { display: block; }
    #scene {
      width: 100%;
      min-height: 700px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    .bg-layer {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #07021a 0%, #120830 40%, #0d1f0a 100%);
    }
    #chapter-header {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 28px 20px 0;
      width: 100%;
    }
    #chapter-title {
      color: #d4b4fe;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
      font-family: sans-serif;
    }
    #chapter-name {
      color: #fef3c7;
      font-size: 20px;
      text-shadow: 0 0 20px #f59e0b;
      line-height: 1.4;
    }
    #story-art {
      position: relative;
      z-index: 5;
      margin: 20px auto 0;
      width: 280px;
      height: 180px;
      flex-shrink: 0;
    }
    #narrative {
      position: relative;
      z-index: 5;
      max-width: 520px;
      width: 90%;
      margin: 18px auto 0;
      text-align: center;
    }
    .narr-line {
      color: #e2d5f3;
      font-size: 15px;
      line-height: 1.8;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.5s, transform 0.5s;
      font-style: italic;
      display: block;
      margin: 2px 0;
    }
    .narr-line.vis { opacity: 1; transform: none; }
    .narr-line.dialogue { color: #fde68a; font-style: normal; }
    #choices {
      position: relative;
      z-index: 5;
      max-width: 500px;
      width: 90%;
      margin: 22px auto 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 30px;
    }
    .choice-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(168,85,247,0.35);
      border-radius: 12px;
      color: #e9d5ff;
      font-size: 14px;
      padding: 14px 20px;
      cursor: pointer;
      font-family: 'Georgia', serif;
      text-align: left;
      transition: all 0.25s;
      line-height: 1.5;
    }
    .choice-btn:hover {
      background: rgba(168,85,247,0.18);
      border-color: rgba(168,85,247,0.7);
      transform: translateX(4px);
    }
    .choice-btn.correct {
      border-color: #4ade80;
      background: rgba(74,222,128,0.12);
      color: #bbf7d0;
    }
    .choice-btn.wrong {
      border-color: #f87171;
      background: rgba(248,113,113,0.1);
      color: #fca5a5;
    }
    .clock-item {
      cursor: pointer;
      transition: all 0.3s;
    }
    .clock-item:hover rect { filter: brightness(1.3); }
    .clock-item.selected rect { stroke: #fbbf24; stroke-width: 2; }
    #input-area {
      position: relative;
      z-index: 5;
      max-width: 460px;
      width: 90%;
      margin: 20px auto;
      padding-bottom: 30px;
    }
    #promise-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(168,85,247,0.4);
      border-radius: 12px;
      color: #e9d5ff;
      font-size: 15px;
      padding: 14px 18px;
      font-family: 'Georgia', serif;
      resize: none;
      height: 80px;
      outline: none;
      transition: border-color 0.2s;
    }
    #promise-input:focus { border-color: rgba(168,85,247,0.8); }
    #promise-input::placeholder { color: rgba(200,180,255,0.4); }
    .submit-btn {
      margin-top: 12px;
      width: 100%;
      background: rgba(168,85,247,0.2);
      border: 1px solid rgba(168,85,247,0.5);
      border-radius: 12px;
      color: #e9d5ff;
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
      font-family: 'Georgia', serif;
      transition: all 0.25s;
    }
    .submit-btn:hover { background: rgba(168,85,247,0.38); }
    #feedback-box {
      position: relative;
      z-index: 5;
      max-width: 480px;
      width: 90%;
      margin: 0 auto 20px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 14px;
      padding: 18px 22px;
      color: #c4b5fd;
      font-size: 14px;
      line-height: 1.7;
      font-family: sans-serif;
      display: none;
    }
    #feedback-box.show { display: block; }
    #progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,0.08);
      z-index: 20;
    }
    #progress-fill {
      height: 100%;
      background: #7c3aed;
      transition: width 0.6s ease;
      border-radius: 0 2px 2px 0;
    }
    .tick-anim {
      position: absolute;
      font-size: 18px;
      color: #fbbf24;
      animation: tickUp 1.2s ease forwards;
      pointer-events: none;
      z-index: 30;
    }
    @keyframes tickUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-40px); }
    }
    .float-clock {
      position: absolute;
      pointer-events: none;
      animation: floatC var(--d) ease-in-out infinite;
      font-size: var(--s);
      opacity: 0.25;
    }
    @keyframes floatC {
      0%, 100% { transform: translateY(0) rotate(var(--r)); }
      50% { transform: translateY(-10px) rotate(calc(var(--r) + 8deg)); }
    }
    #diary-unlock {
      position: relative;
      z-index: 5;
      max-width: 460px;
      width: 90%;
      margin: 0 auto 30px;
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.35);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
    }
    #diary-unlock h3 { color: #fef3c7; font-size: 17px; margin-bottom: 12px; }
    #diary-unlock p { color: #fde68a; font-size: 13px; line-height: 1.7; font-family: sans-serif; }
    .next-btn {
      margin-top: 16px;
      background: rgba(124,58,237,0.25);
      border: 1px solid rgba(168,85,247,0.5);
      border-radius: 10px;
      color: #e9d5ff;
      font-size: 13px;
      padding: 10px 24px;
      cursor: pointer;
      font-family: sans-serif;
      transition: all 0.2s;
    }
    .next-btn:hover { background: rgba(124,58,237,0.45); }
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 25;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #c4b5fd;
      padding: 8px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-family: 'Georgia', serif;
      font-size: 13px;
      transition: all 0.3s;
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>

<div id="world" role="main" aria-label="Thế giới thần tiên">

  <!-- Door scene -->
  <div id="door-wrap">
    <svg id="door-svg" width="200" height="280" viewBox="0 0 200 280" onclick="openDoor()">
      <!-- Door frame -->
      <rect x="20" y="10" width="160" height="260" rx="80" fill="none" stroke="#7c3aed" stroke-width="3"/>
      <rect x="20" y="10" width="160" height="260" rx="80" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.5"/>
      <!-- Door body -->
      <rect x="30" y="20" width="140" height="240" rx="70" fill="#1e0a4e" opacity="0.9"/>
      <!-- Door glow rings -->
      <rect x="30" y="20" width="140" height="240" rx="70" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.6"/>
      <!-- Vines left -->
      <path d="M20 80 Q5 100 15 130 Q0 150 10 180" fill="none" stroke="#166534" stroke-width="2"/>
      <circle cx="8" cy="105" r="8" fill="#16a34a" opacity="0.8"/>
      <circle cx="3" cy="145" r="6" fill="#15803d" opacity="0.7"/>
      <circle cx="7" cy="170" r="7" fill="#22c55e" opacity="0.6"/>
      <!-- Vines right -->
      <path d="M180 80 Q195 100 185 130 Q200 150 190 180" fill="none" stroke="#166534" stroke-width="2"/>
      <circle cx="192" cy="105" r="8" fill="#16a34a" opacity="0.8"/>
      <circle cx="197" cy="145" r="6" fill="#15803d" opacity="0.7"/>
      <circle cx="193" cy="170" r="7" fill="#22c55e" opacity="0.6"/>
      <!-- Flowers on door -->
      <circle cx="100" cy="100" r="5" fill="#f9a8d4"/>
      <circle cx="95" cy="95" r="3" fill="#f472b6"/>
      <circle cx="105" cy="95" r="3" fill="#f472b6"/>
      <circle cx="100" cy="90" r="3" fill="#f472b6"/>
      <circle cx="100" cy="100" r="3" fill="#fbbf24"/>
      <!-- Door handle -->
      <circle cx="130" cy="150" r="7" fill="#fbbf24" opacity="0.9"/>
      <circle cx="130" cy="150" r="4" fill="#f59e0b"/>
      <!-- Magical symbols -->
      <text x="100" y="200" text-anchor="middle" fill="#a855f7" font-size="28" opacity="0.6">✦</text>
      <text x="70" y="160" text-anchor="middle" fill="#7c3aed" font-size="14" opacity="0.5">✧</text>
      <text x="130" y="130" text-anchor="middle" fill="#7c3aed" font-size="14" opacity="0.5">✧</text>
    </svg>
    <div class="click-hint">✨ Chạm để mở cánh cửa ✨</div>
  </div>

  <!-- Forest scene (hidden initially) -->
  <div id="forest">
    <svg width="100%" height="100%" viewBox="0 0 680 600" preserveAspectRatio="xMidYMid slice">
      <!-- Sky gradient -->
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0f0035"/>
          <stop offset="60%" stop-color="#1a0a4e"/>
          <stop offset="100%" stop-color="#0d3320"/>
        </linearGradient>
        <linearGradient id="moonGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="objectBoundingBox">
          <stop offset="0%" stop-color="#fef9c3"/>
          <stop offset="100%" stop-color="#fef08a" stop-opacity="0"/>
        </linearGradient>
        <radialGradient id="mglow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fef9c3" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
      </defs>
      <rect width="680" height="600" fill="url(#sky)"/>
      <!-- Moon -->
      <circle cx="340" cy="80" r="50" fill="url(#mglow)"/>
      <circle cx="340" cy="80" r="38" fill="#fef9c3" opacity="0.15"/>
      <circle cx="340" cy="80" r="28" fill="#fef3c7" opacity="0.4"/>
      <circle cx="340" cy="80" r="18" fill="#fef9c3" opacity="0.7"/>
      <!-- Stars -->
      <circle cx="60" cy="40" r="1.5" fill="white" opacity="0.8"/>
      <circle cx="140" cy="25" r="1" fill="white" opacity="0.6"/>
      <circle cx="220" cy="55" r="1.5" fill="white" opacity="0.9"/>
      <circle cx="460" cy="30" r="1" fill="white" opacity="0.7"/>
      <circle cx="550" cy="50" r="1.5" fill="white" opacity="0.8"/>
      <circle cx="620" cy="25" r="1" fill="white" opacity="0.6"/>
      <circle cx="180" cy="70" r="1" fill="white" opacity="0.5"/>
      <circle cx="500" cy="65" r="1.5" fill="white" opacity="0.7"/>
      <!-- Ground -->
      <ellipse cx="340" cy="580" rx="380" ry="100" fill="#0d4a20" opacity="0.8"/>
      <rect x="0" y="500" width="680" height="100" fill="#0a3d1a"/>
      <!-- Grass tufts -->
      <path d="M0 500 Q20 480 40 500 Q60 480 80 500 Q100 480 120 500 Q140 480 160 500 Q180 480 200 500 Q220 480 240 500 Q260 480 280 500 Q300 480 320 500 Q340 480 360 500 Q380 480 400 500 Q420 480 440 500 Q460 480 480 500 Q500 480 520 500 Q540 480 560 500 Q580 480 600 500 Q620 480 640 500 Q660 480 680 500 L680 600 L0 600Z" fill="#0d4a20"/>
      <!-- Trees left cluster -->
      <rect x="20" y="280" width="18" height="240" fill="#3d1f00"/>
      <ellipse cx="29" cy="250" rx="45" ry="80" fill="#14532d"/>
      <ellipse cx="29" cy="210" rx="35" ry="60" fill="#166534"/>
      <ellipse cx="29" cy="175" rx="22" ry="45" fill="#15803d"/>
      <circle cx="55" cy="230" r="8" fill="#f9a8d4" opacity="0.8"/>
      <circle cx="10" cy="200" r="6" fill="#fbcfe8" opacity="0.7"/>
      <circle cx="35" cy="185" r="5" fill="#f472b6" opacity="0.8"/>

      <rect x="80" y="320" width="14" height="200" fill="#3d1f00"/>
      <ellipse cx="87" cy="295" rx="38" ry="65" fill="#166534"/>
      <ellipse cx="87" cy="260" rx="28" ry="50" fill="#16a34a"/>

      <!-- Trees right cluster -->
      <rect x="640" y="280" width="18" height="240" fill="#3d1f00"/>
      <ellipse cx="649" cy="250" rx="45" ry="80" fill="#14532d"/>
      <ellipse cx="649" cy="210" rx="35" ry="60" fill="#166534"/>
      <ellipse cx="649" cy="175" rx="22" ry="45" fill="#15803d"/>
      <circle cx="625" cy="225" r="8" fill="#f9a8d4" opacity="0.8"/>
      <circle cx="668" cy="200" r="6" fill="#fbcfe8" opacity="0.7"/>

      <rect x="580" y="320" width="14" height="200" fill="#3d1f00"/>
      <ellipse cx="587" cy="295" rx="38" ry="65" fill="#166534"/>
      <ellipse cx="587" cy="260" rx="28" ry="50" fill="#16a34a"/>

      <!-- Middle trees -->
      <rect x="160" y="350" width="12" height="170" fill="#3d1f00"/>
      <ellipse cx="166" cy="325" rx="32" ry="55" fill="#166534"/>
      <ellipse cx="166" cy="295" rx="24" ry="42" fill="#22c55e" opacity="0.8"/>

      <rect x="490" y="350" width="12" height="170" fill="#3d1f00"/>
      <ellipse cx="496" cy="325" rx="32" ry="55" fill="#166534"/>
      <ellipse cx="496" cy="295" rx="24" ry="42" fill="#22c55e" opacity="0.8"/>

      <!-- Mushrooms -->
      <rect x="230" y="480" width="8" height="25" fill="#fde8d8" rx="2"/>
      <ellipse cx="234" cy="478" rx="18" ry="12" fill="#dc2626"/>
      <circle cx="228" cy="474" r="3" fill="white" opacity="0.8"/>
      <circle cx="237" cy="471" r="2.5" fill="white" opacity="0.8"/>
      <circle cx="240" cy="478" r="2" fill="white" opacity="0.8"/>

      <rect x="420" y="480" width="8" height="25" fill="#fde8d8" rx="2"/>
      <ellipse cx="424" cy="478" rx="18" ry="12" fill="#dc2626"/>
      <circle cx="418" cy="474" r="3" fill="white" opacity="0.8"/>
      <circle cx="427" cy="471" r="2.5" fill="white" opacity="0.8"/>

      <!-- Path -->

function openDoor() {
  const doorWrap = document.getElementById('door-wrap');
  const forest = document.getElementById('forest');
  const welcome = document.getElementById('welcome');
  const animals = document.getElementById('animals');
  const world = document.getElementById('world');

  // Spawn particles
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.random() * 360) * Math.PI / 180;
    const dist = 80 + Math.random() * 200;
    const colors = ['#a855f7','#f0abfc','#fbbf24','#86efac','#93c5fd','#f9a8d4'];
    const col = colors[Math.floor(Math.random() * colors.length)];
    const size = 3 + Math.random() * 8;
    p.style.cssText = `
      left: 50%; top: 50%;
      width: ${size}px; height: ${size}px;
      background: ${col};
      box-shadow: 0 0 ${size*2}px ${col};
      --tx: ${Math.cos(angle)*dist}px;
      --ty: ${Math.sin(angle)*dist}px;
      --dur: ${0.6 + Math.random() * 0.8}s;
    `;
    world.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }

  // Fade out door
  doorWrap.style.opacity = '0';
  doorWrap.style.transform = 'translate(-50%,-50%) scale(1.5)';
  doorWrap.style.transition = 'opacity 0.8s, transform 0.8s';

  setTimeout(() => {
    doorWrap.style.display = 'none';
    forest.classList.add('show');

    // Add fireflies
    for (let i = 0; i < 12; i++) {
      const f = document.createElement('div');
      f.className = 'firefly';
      f.style.cssText = `
        left: ${10 + Math.random() * 80}%;
        top: ${30 + Math.random() * 50}%;
        --d: ${3 + Math.random() * 4}s;
        --mx: ${-30 + Math.random() * 60}px;
        --my: ${-30 + Math.random() * 60}px;
        animation-delay: ${Math.random() * 3}s;
      `;
      world.appendChild(f);
    }

    setTimeout(() => {
      welcome.classList.add('show');
      setTimeout(() => animals.classList.add('show'), 800);
    }, 800);
  }, 900);
}

function showStory(type) {
  const s = stories[type];

  document.getElementById('story-popup').classList.add('show');
}

const clockAnswers={
  gold:{text:'"Ta là tương lai."',label:'Đồng hồ Vàng'},
  silver:{text:'"Đồng hồ đen đang nói dối."',label:'Đồng hồ Bạc'},
  black:{text:'"Ta là quá khứ."',label:'Đồng hồ Đen'}
};

let clockRevealed={gold:false,silver:false,black:false};
let clockSolved=false;

function selectClock(type){
  if(clockSolved) return;
  const fb=document.getElementById('feedback-box');
  const info=clockAnswers[type];
  
  document.querySelectorAll('.clock-item').forEach(el=>el.classList.remove('selected'));
  document.getElementById('c-'+type).classList.add('selected');
  clockRevealed[type]=true;

  let allRevealed=Object.values(clockRevealed).every(v=>v);
  
  if(allRevealed){
    clockSolved=true;
    fb.innerHTML=`<strong style="color:#fde68a">Phán xét:</strong><br>
      Vàng nói: "Ta là tương lai."<br>
      Bạc nói: "Đồng hồ đen đang nói dối."<br>
      Đen nói: "Ta là quá khứ."<br><br>
      Nếu Vàng = tương lai → Đen = quá khứ (đúng) → Bạc tố Đen dối là <em>sai</em>.<br>
      Nếu Đen = quá khứ (đúng) → Bạc nói Đen dối → Bạc dối.<br>
      Vậy chỉ một người nói thật: <strong style="color:#86efac">Đồng hồ Bạc</strong> — vì Đen thực sự nói thật về quá khứ, còn Bạc tố oan nó.<br><br>
      <em>Khoan — thực ra logic đảo:</em> Nếu Bạc nói thật → Đen dối → Đen không phải quá khứ → Vàng dối → Vàng không phải tương lai → Chỉ Bạc không mâu thuẫn. <strong style="color:#86efac">✓ Đồng hồ Bạc nói thật.</strong>`;
    fb.classList.add('show');
    document.getElementById('choices').innerHTML=`<button class="choice-btn correct" onclick="goTo('ch2')">Cánh cổng mở ra... Bước tiếp →</button>`;
  } else {
    fb.innerHTML=`<strong style="color:#fde68a">${info.label}</strong> thì thầm: <em style="color:#c4b5fd">${info.text}</em><br><small style="color:#9ca3af">Hãy nhấn vào tất cả đồng hồ trước khi phán xét.</small>`;
    fb.classList.add('show');
  }
}

let mirrorDone=false;
function mirrorChoose(idx,btn){
  if(mirrorDone) return;
  mirrorDone=true;
  document.querySelectorAll('.choice-btn').forEach((b,i)=>{
    b.disabled=true;
    if(i===idx) b.classList.add('wrong');
  });
  const fb=document.getElementById('feedback-box');
  fb.innerHTML=`Cậu bé chỉ cười...<br><em style="color:#fde68a">"Sai rồi."</em><br><br><span style="color:#e9d5ff">Màn hình rung nhẹ. Một dòng chữ hiện ra:</span><br><strong style="color:#f0abfc">"Người quên lời hứa chính là người trả lời."</strong><br><br><small style="color:#9ca3af">Không có đáp án đúng. Chính việc bạn phải suy nghĩ chứng tỏ bạn đã quên.</small>`;
  fb.classList.add('show');

  const svgEl=document.getElementById('story-art').querySelector('svg');
  if(svgEl){
    svgEl.style.transition='transform 0.1s';
    let i=0;const shake=setInterval(()=>{
      svgEl.style.transform=i%2?'translateX(4px)':'translateX(-4px)';
      if(++i>8){clearInterval(shake);svgEl.style.transform='';}
    },80);
  }

  setTimeout(()=>{
    document.getElementById('choices').innerHTML=`<button class="choice-btn" onclick="goTo('ch3')" style="border-color:rgba(168,85,247,0.5)">Chiếc gương vỡ... Bước tiếp →</button>`;
  },1800);
}

function pathChoose(idx,isCorrect,btn){
  document.querySelectorAll('.choice-btn').forEach((b,i)=>{
    b.disabled=true;
    if(i===idx) b.classList.add(isCorrect?'correct':'wrong');
  });
  const fb=document.getElementById('feedback-box');
  if(isCorrect){
    fb.innerHTML=`<strong style="color:#86efac">Đúng rồi!</strong> Con đường không có dấu chân — chưa ai từng đi.<br><br>Thỏ gật đầu: <em style="color:#fde68a">"Đôi khi can đảm nhất là bước vào nơi chưa ai từng đến."</em>`;
    fb.classList.add('show');
    setTimeout(()=>{
      document.getElementById('choices').innerHTML=`<button class="choice-btn correct" onclick="goTo('ch4')">Tiếp tục theo Thỏ →</button>`;
    },1500);
  } else {
    fb.innerHTML=`<em style="color:#fca5a5">Con đường này dẫn về... vòng lặp cũ.</em><br><br>Thỏ lắc đầu nhẹ: <em style="color:#fde68a">"Con đường đông người đi nhất không phải lúc nào cũng dẫn tới đích."</em><br><br><small style="color:#9ca3af">Hãy thử lại.</small>`;
    fb.classList.add('show');
    setTimeout(()=>{
      document.querySelectorAll('.choice-btn').forEach(b=>{b.disabled=false;b.classList.remove('wrong');});
      fb.classList.remove('show');
    },2000);
  }
}

function submitPromise(){
  const val=document.getElementById('promise-input').value.trim();
  if(!val) return;
  document.getElementById('input-area').innerHTML=`<div style="color:#86efac;font-size:14px;text-align:center;padding:10px 0;font-family:Georgia,serif;">
    <em>"${val}"</em><br><br>
    <span style="color:#fde68a;font-size:22px;">Tích... Tích... Tích...</span>
  </div>
  <button class="submit-btn" style="margin-top:14px" onclick="goTo('end')">Xem kết thúc...</button>`;
}

function goTo(id){
  document.getElementById('feedback-box').classList.remove('show');
  document.getElementById('feedback-box').innerHTML='';
  mirrorDone=false;
  renderChapter(id);
}

function renderChapter(id){
  const ch=getChapter(id);
  if(!ch) return;
  G.chapter=id;

  document.getElementById('progress-fill').style.width=ch.progress+'%';
  document.getElementById('chapter-title').textContent=ch.title||'Tuyến Thỏ';
  document.getElementById('chapter-name').textContent=ch.name||'Khu Rừng Những Chiếc Đồng Hồ';

  const artEl=document.getElementById('story-art');
  artEl.innerHTML='';
  if(ch.art) ch.art(artEl);

  const narr=document.getElementById('narrative');
  narr.innerHTML='';
  ch.lines.forEach((l,i)=>{
    const span=document.createElement('span');
    span.className='narr-line'+(l.cls?' '+l.cls:'');
    span.textContent=l.t;
    narr.appendChild(span);
    setTimeout(()=>span.classList.add('vis'),200+i*280);
  });

  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  const inputEl=document.getElementById('input-area');
  inputEl.style.display='none';
  inputEl.innerHTML='';

  const delay=(ch.lines.length)*280+400;

  if(ch.type==='clock_puzzle'){
    clockRevealed={gold:false,silver:false,black:false};
    clockSolved=false;
    setTimeout(()=>{
      choicesEl.innerHTML=`<div style="color:#c4b5fd;font-size:13px;text-align:center;font-family:sans-serif;padding:6px 0;">
        Một chiếc thuộc về quá khứ · Một chiếc thuộc về hiện tại · Một chiếc thuộc về tương lai<br>
        <strong style="color:#fde68a">Chỉ một chiếc nói thật.</strong>
      </div>`;
    },delay);
  } else if(ch.type==='mirror_choice'){
    setTimeout(()=>{
      ch.choices.forEach((c,i)=>{
        const b=document.createElement('button');
        b.className='choice-btn';
        b.textContent=c.label;
        b.onclick=()=>mirrorChoose(i,b);
        choicesEl.appendChild(b);
      });
    },delay);
  } else if(ch.type==='path_choice'){
    setTimeout(()=>{
      ch.choices.forEach((c,i)=>{
        const b=document.createElement('button');
        b.className='choice-btn';
        b.textContent=c.label;
        b.onclick=()=>pathChoose(i,!!c.correct,b);
        choicesEl.appendChild(b);
      });
    },delay);
  } else if(ch.type==='input'){
    setTimeout(()=>{
      inputEl.style.display='block';
      inputEl.innerHTML=`<textarea id="promise-input" placeholder="Viết câu trả lời của bạn..."></textarea>
      <button class="submit-btn" onclick="submitPromise()">Trao đồng hồ ✦</button>`;
    },delay);
  } else if(ch.type==='ending'){
    setTimeout(()=>{
      choicesEl.innerHTML=`<div id="diary-unlock">
        <h3>📖 Nhật Ký Số 1 Đã Mở Khóa</h3>
        <p>"Người chạy nhanh nhất chưa chắc là người đến đích đầu tiên.<br>Có khi họ chỉ là người đang cố trốn khỏi chính mình."</p>
        <button class="next-btn" onclick="backToForest()">Quay lại rừng ✦</button>
      </div>`;
    },delay);
  } else if(ch.choices){
    setTimeout(()=>{
      ch.choices.forEach(c=>{
        const b=document.createElement('button');
        b.className='choice-btn';
        b.textContent=c.label;
        b.onclick=()=>goTo(c.next);
        choicesEl.appendChild(b);
      });
    },delay);
  }
}
</script>
