<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thế Giới Thần Tiên</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; }

    #world {
      width: 100%;
      min-height: 600px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0520 0%, #1a0a3e 40%, #2d1b69 70%, #1a3a2a 100%);
      cursor: pointer;
      border-radius: 16px;
      font-family: 'Georgia', serif;
    }

    /* Stars */
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--dur, 2s) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    /* Door */
    #door-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      transition: opacity 0.5s;
    }

    #door-svg {
      filter: drop-shadow(0 0 20px #a78bfa) drop-shadow(0 0 40px #7c3aed);
      cursor: pointer;
      transition: filter 0.3s;
    }
    #door-svg:hover {
      filter: drop-shadow(0 0 30px #f0abfc) drop-shadow(0 0 60px #c084fc);
    }

    .click-hint {
      color: #d4b4fe;
      font-size: 14px;
      margin-top: 12px;
      animation: pulse 2s ease-in-out infinite;
      text-shadow: 0 0 10px #a78bfa;
      letter-spacing: 1px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: flyOut var(--dur) ease-out forwards;
    }
    @keyframes flyOut {
      0% { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
    }

    /* Forest scene */
    #forest {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.5s ease;
      pointer-events: none;
    }
    #forest.show {
      opacity: 1;
      pointer-events: all;
    }

    /* Welcome text */
    #welcome {
      position: absolute;
      top: 60px;
      left: 0; right: 0;
      text-align: center;
      color: #fef9c3;
      font-size: 22px;
      text-shadow: 0 0 20px #f59e0b;
      letter-spacing: 2px;
      opacity: 0;
      transform: translateY(-20px);
      transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
      z-index: 20;
      font-family: 'Georgia', serif;
      line-height: 1.6;
    }
    #welcome.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Animal cards */
    #animals {
      position: absolute;
      bottom: 30px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 0 20px;
      z-index: 30;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 1s ease 1.5s, transform 1s ease 1.5s;
    }
    #animals.show {
      opacity: 1;
      transform: translateY(0);
    }

    .animal-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 14px 18px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(6px);
      min-width: 110px;
      text-decoration: none;
      display: block;
    }
    .animal-card:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-6px) scale(1.05);
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 8px 30px rgba(167,139,250,0.4);
    }
    .animal-emoji {
      font-size: 32px;
      display: block;
      margin-bottom: 6px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }
    .animal-name {
      color: #f0e6ff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    .animal-genre {
      color: #c4b5fd;
      font-size: 10px;
      margin-top: 2px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    /* Floating leaves */
    .leaf {
      position: absolute;
      pointer-events: none;
      animation: floatLeaf var(--d) ease-in-out infinite;
      opacity: 0.7;
    }
    @keyframes floatLeaf {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
      50% { transform: translateY(-15px) rotate(180deg); opacity: 1; }
      100% { transform: translateY(0) rotate(360deg); opacity: 0.7; }
    }

    /* Fireflies */
    .firefly {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #bbf7d0;
      box-shadow: 0 0 6px #4ade80, 0 0 12px #86efac;
      animation: drift var(--d) ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes drift {
      0%, 100% { transform: translate(0,0); opacity: 0.2; }
      25% { transform: translate(var(--mx),var(--my)); opacity: 1; }
      75% { transform: translate(calc(var(--mx) * -0.5), calc(var(--my) * 1.5)); opacity: 0.6; }
    }
  </style>
</head>
<body>

<div id="world" role="main" aria-label="Thế giới thần tiên">

  <!-- Door scene -->
  <div id="door-wrap">
    <svg id="door-svg" width="200" height="280" viewBox="0 0 200 280" onclick="openDoor()">
      <!-- Door frame -->
      <rect x="20" y="10" width="160" height="260" rx="80" fill="none" stroke="#7c3aed" stroke-width="3"/>
      <rect x="20" y="10" width="160" height="260" rx="80" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.5"/>
      <!-- Door body -->
      <rect x="30" y="20" width="140" height="240" rx="70" fill="#1e0a4e" opacity="0.9"/>
      <!-- Door glow rings -->
      <rect x="30" y="20" width="140" height="240" rx="70" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
      <!-- Vines left -->
      <path d="M20 80 Q5 100 15 130 Q0 150 10 180" fill="none" stroke="#166534" stroke-width="2"/>
      <circle cx="8" cy="105" r="8" fill="#16a34a" opacity="0.8"/>
      <circle cx="3" cy="145" r="6" fill="#15803d" opacity="0.7"/>
      <circle cx="7" cy="170" r="7" fill="#22c55e" opacity="0.6"/>
      <!-- Vines right -->
      <path d="M180 80 Q195 100 185 130 Q200 150 190 180" fill="none" stroke="#166534" stroke-width="2"/>
      <circle cx="192" cy="105" r="8" fill="#16a34a" opacity="0.8"/>
      <circle cx="197" cy="145" r="6" fill="#15803d" opacity="0.7"/>
      <circle cx="193" cy="170" r="7" fill="#22c55e" opacity="0.6"/>
      <!-- Flowers on door -->
      <circle cx="100" cy="100" r="5" fill="#f9a8d4"/>
      <circle cx="95" cy="95" r="3" fill="#f472b6"/>
      <circle cx="105" cy="95" r="3" fill="#f472b6"/>
      <circle cx="100" cy="90" r="3" fill="#f472b6"/>
      <circle cx="100" cy="100" r="3" fill="#fbbf24"/>
      <!-- Door handle -->
      <circle cx="130" cy="150" r="7" fill="#fbbf24" opacity="0.9"/>
      <circle cx="130" cy="150" r="4" fill="#f59e0b"/>
      <!-- Magical symbols -->
      <text x="100" y="200" text-anchor="middle" fill="#a78bfa" font-size="28" opacity="0.6">✦</text>
      <text x="70" y="160" text-anchor="middle" fill="#7c3aed" font-size="14" opacity="0.5">✧</text>
      <text x="130" y="130" text-anchor="middle" fill="#7c3aed" font-size="14" opacity="0.5">✧</text>
    </svg>
    <div class="click-hint">✨ Chạm để mở cánh cửa ✨</div>
  </div>

  <!-- Forest scene (hidden initially) -->
  <div id="forest">
    <svg width="100%" height="100%" viewBox="0 0 680 600" preserveAspectRatio="xMidYMid slice">
      <!-- Sky gradient -->
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0f0035"/>
          <stop offset="60%" stop-color="#1a0a4e"/>
          <stop offset="100%" stop-color="#0d3320"/>
        </linearGradient>
        <radialGradient id="mglow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fef9c3" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
      </defs>
      <rect width="680" height="600" fill="url(#sky)"/>
      <!-- Moon -->
      <circle cx="340" cy="80" r="50" fill="url(#mglow)"/>
      <circle cx="340" cy="80" r="38" fill="#fef9c3" opacity="0.15"/>
      <circle cx="340" cy="80" r="28" fill="#fef3c7" opacity="0.4"/>
      <circle cx="340" cy="80" r="18" fill="#fef9c3" opacity="0.7"/>
      <!-- Stars -->
      <circle cx="60" cy="40" r="1.5" fill="white" opacity="0.8"/>
      <circle cx="140" cy="25" r="1" fill="white" opacity="0.6"/>
      <circle cx="220" cy="55" r="1.5" fill="white" opacity="0.9"/>
      <circle cx="460" cy="30" r="1" fill="white" opacity="0.7"/>
      <circle cx="550" cy="50" r="1.5" fill="white" opacity="0.8"/>
      <circle cx="620" cy="25" r="1" fill="white" opacity="0.6"/>
      <circle cx="180" cy="70" r="1" fill="white" opacity="0.5"/>
      <circle cx="500" cy="65" r="1.5" fill="white" opacity="0.7"/>
      <!-- Ground -->
      <ellipse cx="340" cy="580" rx="380" ry="100" fill="#0d4a20" opacity="0.8"/>
      <rect x="0" y="500" width="680" height="100" fill="#0a3d1a"/>
      <!-- Grass tufts -->
      <path d="M0 500 Q20 480 40 500 Q60 480 80 500 Q100 480 120 500 Q140 480 160 500 Q180 480 200 500 Q220 480 240 500 Q260 480 280 500 Q300 480 320 500 Q340 480 360 500 Q380 480 400 500 Q420 480 440 500 Q460 480 480 500 Q500 480 520 500 Q540 480 560 500 Q580 480 600 500 Q620 480 640 500 Q660 480 680 500 L680 600 L0 600Z" fill="#0d4a20"/>
      <!-- Trees left cluster -->
      <rect x="20" y="280" width="18" height="240" fill="#3d1f00"/>
      <ellipse cx="29" cy="250" rx="45" ry="80" fill="#14532d"/>
      <ellipse cx="29" cy="210" rx="35" ry="60" fill="#166534"/>
      <ellipse cx="29" cy="175" rx="22" ry="45" fill="#15803d"/>
      <circle cx="55" cy="230" r="8" fill="#f9a8d4" opacity="0.8"/>
      <circle cx="10" cy="200" r="6" fill="#fbcfe8" opacity="0.7"/>
      <circle cx="35" cy="185" r="5" fill="#f472b6" opacity="0.8"/>

      <rect x="80" y="320" width="14" height="200" fill="#3d1f00"/>
      <ellipse cx="87" cy="295" rx="38" ry="65" fill="#166534"/>
      <ellipse cx="87" cy="260" rx="28" ry="50" fill="#16a34a"/>

      <!-- Trees right cluster -->
      <rect x="640" y="280" width="18" height="240" fill="#3d1f00"/>
      <ellipse cx="649" cy="250" rx="45" ry="80" fill="#14532d"/>
      <ellipse cx="649" cy="210" rx="35" ry="60" fill="#166534"/>
      <ellipse cx="649" cy="175" rx="22" ry="45" fill="#15803d"/>
      <circle cx="625" cy="225" r="8" fill="#f9a8d4" opacity="0.8"/>
      <circle cx="668" cy="200" r="6" fill="#fbcfe8" opacity="0.7"/>

      <rect x="580" y="320" width="14" height="200" fill="#3d1f00"/>
      <ellipse cx="587" cy="295" rx="38" ry="65" fill="#166534"/>
      <ellipse cx="587" cy="260" rx="28" ry="50" fill="#16a34a"/>

      <!-- Middle trees -->
      <rect x="160" y="350" width="12" height="170" fill="#3d1f00"/>
      <ellipse cx="166" cy="325" rx="32" ry="55" fill="#166534"/>
      <ellipse cx="166" cy="295" rx="24" ry="42" fill="#22c55e" opacity="0.8"/>

      <rect x="490" y="350" width="12" height="170" fill="#3d1f00"/>
      <ellipse cx="496" cy="325" rx="32" ry="55" fill="#166534"/>
      <ellipse cx="496" cy="295" rx="24" ry="42" fill="#22c55e" opacity="0.8"/>

      <!-- Mushrooms -->
      <rect x="230" y="480" width="8" height="25" fill="#fde8d8" rx="2"/>
      <ellipse cx="234" cy="478" rx="18" ry="12" fill="#dc2626"/>
      <circle cx="228" cy="474" r="3" fill="white" opacity="0.8"/>
      <circle cx="237" cy="471" r="2.5" fill="white" opacity="0.8"/>
      <circle cx="240" cy="478" r="2" fill="white" opacity="0.8"/>

      <rect x="420" y="480" width="8" height="25" fill="#fde8d8" rx="2"/>
      <ellipse cx="424" cy="478" rx="18" ry="12" fill="#dc2626"/>
      <circle cx="418" cy="474" r="3" fill="white" opacity="0.8"/>
      <circle cx="427" cy="471" r="2.5" fill="white" opacity="0.8"/>

      <!-- Path -->
      <path d="M240 600 Q300 560 340 520 Q380 560 440 600" fill="#2d4a1e" opacity="0.5"/>

      <!-- Flowers in ground -->
      <circle cx="200" cy="490" r="4" fill="#fbbf24"/>
      <circle cx="280" cy="488" r="3" fill="#f9a8d4"/>
      <circle cx="360" cy="492" r="4" fill="#a78bfa"/>
      <circle cx="440" cy="487" r="3" fill="#fbbf24"/>
      <circle cx="500" cy="491" r="4" fill="#f9a8d4"/>

      <!-- Vines hanging -->
      <path d="M100 0 Q95 80 105 160 Q100 240 95 280" fill="none" stroke="#166534" stroke-width="2" opacity="0.7"/>
      <circle cx="98" cy="90" r="5" fill="#16a34a" opacity="0.8"/>
      <circle cx="103" cy="150" r="6" fill="#14532d" opacity="0.7"/>
      <circle cx="97" cy="210" r="5" fill="#15803d" opacity="0.8"/>
      <circle cx="94" cy="265" r="7" fill="#f9a8d4" opacity="0.8"/>

      <path d="M580 0 Q585 80 575 160 Q580 240 585 280" fill="none" stroke="#166534" stroke-width="2" opacity="0.7"/>
      <circle cx="582" cy="90" r="5" fill="#16a34a" opacity="0.8"/>
      <circle cx="577" cy="150" r="6" fill="#14532d" opacity="0.7"/>
      <circle cx="583" cy="210" r="5" fill="#15803d" opacity="0.8"/>
      <circle cx="586" cy="265" r="7" fill="#fbcfe8" opacity="0.8"/>
    </svg>
  </div>

  <!-- Welcome text -->
  <div id="welcome">
    <div style="font-size:13px; color:#a78bfa; letter-spacing:3px; margin-bottom:6px;">✦ ✦ ✦</div>
    Chào mừng bạn đến với<br/>
    <span style="font-size:26px; color:#fbbf24; text-shadow: 0 0 20px #f59e0b;">thế giới của những câu chuyện</span>
    <div style="font-size:13px; color:#a78bfa; letter-spacing:3px; margin-top:6px;">✦ ✦ ✦</div>
  </div>

  <!-- Animals -->
  <div id="animals">
    <a href="rabbit_story_game.html" class="animal-card">
      <span class="animal-emoji">🐰</span>
      <div class="animal-name">Thỏ kể chuyện</div>
      <div class="animal-genre">Cổ tích</div>
    </a>
    <a href="fox_story_fixed.html" class="animal-card">
      <span class="animal-emoji">🦊</span>
      <div class="animal-name">Cáo thông thái</div>
      <div class="animal-genre">Phiêu lưu</div>
    </a>
    <a href="bear_story_game.html" class="animal-card">
      <span class="animal-emoji">🐻</span>
      <div class="animal-name">Gấu ngủ đông</div>
      <div class="animal-genre">Giấc mơ</div>
    </a>
    <a href="owl_story_game.html" class="animal-card">
      <span class="animal-emoji">🦉</span>
      <div class="animal-name">Cú mèo đêm</div>
      <div class="animal-genre">Huyền bí</div>
    </a>
  </div>

</div>

<script>
function openDoor() {
  const doorWrap = document.getElementById('door-wrap');
  const forest = document.getElementById('forest');
  const welcome = document.getElementById('welcome');
  const animals = document.getElementById('animals');
  const world = document.getElementById('world');

  // Spawn particles
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.random() * 360) * Math.PI / 180;
    const dist = 80 + Math.random() * 200;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    const size = 3 + Math.random() * 6;
    const colors = ['#a78bfa', '#f472b6', '#fbbf24', '#34d399'];
    const color = colors[Math.floor(Math.random() * colors.length)];
    const dur = 0.6 + Math.random() * 1.2;
    p.style.left = '50%';
    p.style.top = '50%';
    p.style.width = `${size}px`;
    p.style.height = `${size}px`;
    p.style.background = color;
    p.style.setProperty('--tx', `${tx}px`);
    p.style.setProperty('--ty', `${ty}px`);
    p.style.setProperty('--dur', `${dur}s`);
    world.appendChild(p);
    setTimeout(() => p.remove(), 2000);
  }

  // Hide door and show forest
  doorWrap.style.opacity = '0';
  setTimeout(() => {
    doorWrap.style.display = 'none';
    forest.classList.add('show');
    welcome.classList.add('show');
    animals.classList.add('show');
  }, 400);
}

// Create stars
for (let i = 0; i < 80; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = `${Math.random() * 100}%`;
  star.style.top = `${Math.random() * 60}%`;
  star.style.width = `${1 + Math.random() * 2}px`;
  star.style.height = star.style.width;
  star.style.setProperty('--dur', `${1 + Math.random() * 3}s`);
  star.style.animationDelay = `${Math.random() * 2}s`;
  document.getElementById('world').appendChild(star);
}

// Create fireflies
for (let i = 0; i < 15; i++) {
  const firefly = document.createElement('div');
  firefly.className = 'firefly';
  firefly.style.left = `${10 + Math.random() * 80}%`;
  firefly.style.top = `${20 + Math.random() * 70}%`;
  firefly.style.setProperty('--d', `${3 + Math.random() * 4}s`);
  firefly.style.setProperty('--mx', `${-30 + Math.random() * 60}px`);
  firefly.style.setProperty('--my', `${-20 + Math.random() * 40}px`);
  firefly.style.animationDelay = `${Math.random() * 3}s`;
  document.getElementById('forest').appendChild(firefly);
}
</script>

</body>
</html>
